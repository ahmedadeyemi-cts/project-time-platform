      card.querySelector('[data-029-open]').addEventListener('click', function () {

    var shell = document.getElementById(shellId);

    var all = shell.querySelector('[data-030-selected-engineer-all]');
    var checked = Array.from(shell.querySelectorAll('[data-030-selected-engineer]:checked'))
      .map(function (element) { return element.value; })

    if (all && all.checked) {
      state.selectedEngineers = 'All engineers';

    state.selectedEngineers = checked.length ? checked.join(', ') : 'All engineers';

  function csvEscape(value) {
    var output = String(value == null ? '' : value);
    output = output.replaceAll('"', '""');
    return '"' + output + '"';
  }

  function exportVisibleReportCsv() {
    captureInputs();

    var headers = reportHeaders();
    var rows = reportRows();

    if (!rows.length) {
      state.statusType = 'warning';
      state.status = 'Generate a report before exporting CSV.';
      saveState();
      renderShell();
      return;
    }

    var csv = [
      headers.map(csvEscape).join(',')
    ].concat(rows.map(function (row) {
      return headers.map(function (_, index) {
        return csvEscape(Array.isArray(row) ? row[index] : '');
      }).join(',');
    })).join('\n');

    var blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
    var url = URL.createObjectURL(blob);
    var safeName = String(state.reportType || 'report')
      .toLowerCase()
      .replace(/[^a-z0-9]+/g, '-')
      .replace(/^-+|-+$/g, '') || 'report';

    var anchor = document.createElement('a');
    var filename = safeName + '-' + new Date().toISOString().slice(0, 10) + '.csv';

    anchor.href = url;
    anchor.download = filename;
    document.body.appendChild(anchor);
    anchor.click();
    anchor.remove();
    URL.revokeObjectURL(url);

    state.lastExportLayout =
      'CSV Export Generated\n\n' +
      'Report Type: ' + state.reportType + '\n' +
      'Rows Exported: ' + rows.length + '\n' +
      'Columns Exported: ' + headers.length + '\n' +
      'Export File: ' + filename;

    state.exportCenterConfirmed = true;
    state.statusType = 'success';
    state.status = 'CSV export generated for ' + rows.length + ' visible report rows.';
    saveState();
    renderShell();
  }

  function captureInputs() {
    var shell = document.getElementById(shellId);
    if (!shell || shell.getAttribute('data-open') !== 'true') return;

    function get(name) {
      var element = shell.querySelector('[data-029-field="' + name + '"]');
      return element ? element.value : '';
    }

    function checked(name) {
      var element = shell.querySelector('[data-029-check="' + name + '"]');
      return !!(element && element.checked);
    }

    [
      'selectedRole',
      'selectedScenario',
      'validationEnvironment',
      'testerName',
      'evidenceReference',
      'evidenceSummary'
    ].forEach(function (key) {
      state[key] = get(key);
    });

    [
      'roleMatrixConfirmed',
      'workflowScenariosConfirmed',
      'viewAsEnforcementConfirmed',
      'dashboardNavigationRegistryConfirmed',
      'moduleAccessConfirmed',
      'approvalExportAuditConfirmed',
      'evidenceCaptureConfirmed',
      'closeoutConfirmed'
    ].forEach(function (key) {
      state[key] = checked(key);
    });

    saveState();
  }

  function populateShell(shell) {
    [
      'selectedRole',
      'selectedScenario',
      'validationEnvironment',
      'testerName',
      'evidenceReference',
      'evidenceSummary'
    ].forEach(function (key) {
      setValue(shell, key, state[key]);
    });

    [
      'roleMatrixConfirmed',
      'workflowScenariosConfirmed',
      'viewAsEnforcementConfirmed',
      'dashboardNavigationRegistryConfirmed',
      'moduleAccessConfirmed',
      'approvalExportAuditConfirmed',
      'evidenceCaptureConfirmed',
      'closeoutConfirmed'
    ].forEach(function (key) {
      setCheck(shell, key, state[key]);
    });

    var roleNode = shell.querySelector('[data-029-role-output]');
    var workflowNode = shell.querySelector('[data-029-workflow-output]');
    var viewAsNode = shell.querySelector('[data-029-view-as-output]');
    var moduleNode = shell.querySelector('[data-029-module-output]');
    var readinessNode = shell.querySelector('[data-029-readiness-output]');
    var evidenceNode = shell.querySelector('[data-029-evidence-output]');
    var statusNode = shell.querySelector('[data-029-status]');

    if (roleNode) roleNode.textContent = state.lastRoleValidation || 'Prepare role validation to review expected access and restrictions.';
    if (workflowNode) workflowNode.textContent = state.lastWorkflowValidation || 'Prepare workflow scenario validation to review role-specific expected results.';
    if (viewAsNode) viewAsNode.textContent = state.lastViewAsValidation || 'Prepare View-As validation to confirm read-only enforcement and forbidden writes.';
    if (moduleNode) moduleNode.textContent = state.lastModuleValidation || 'Validate module access to review dashboard cards, standalone routes, and registry expectations.';
    if (readinessNode) readinessNode.textContent = state.lastReadiness || readinessSummary();
    if (evidenceNode) evidenceNode.textContent = state.lastEvidence || evidencePreview('module_029_loaded');

    if (statusNode) {
      statusNode.innerHTML = state.status
        ? '<div class="projectpulse-029-status ' + escapeHtml(state.statusType || '') + '">' + escapeHtml(state.status) + '</div>'
        : '';
    }
  }

  function wireShell(shell) {
    shell.querySelectorAll('input, select, textarea').forEach(function (input) {
      input.addEventListener('input', function () {
        captureInputs();
        populateShell(shell);
      });
      input.addEventListener('change', function () {
        captureInputs();
        populateShell(shell);
      });
    });

    shell.querySelector('[data-029-dashboard]').addEventListener('click', function () {
      window.location.hash = '#dashboard';
      render();
    });

    shell.querySelector('[data-029-clear]').addEventListener('click', function () {
      if (!confirm('Clear MODULE 029 preview state on this browser?')) return;
      window.localStorage.removeItem(storageKey);
      location.reload();
    });

    shell.querySelector('[data-029-role]').addEventListener('click', validateRole);
    shell.querySelector('[data-029-workflow]').addEventListener('click', validateWorkflow);
    shell.querySelector('[data-029-view-as]').addEventListener('click', validateViewAs);
    shell.querySelector('[data-029-validate-modules]').addEventListener('click', validateModules);
    shell.querySelector('[data-029-audit]').addEventListener('click', validateApprovalExportAudit);
    shell.querySelector('[data-029-evidence]').addEventListener('click', captureEvidence);
    shell.querySelector('[data-029-readiness]').addEventListener('click', validateReadiness);
  }

  function render() {
    loadState();
    ensureShell();
    ensureCard();
    var currentRoute = route();
    openShell(currentRoute === 'uat-validation' || currentRoute === 'role-validation' || currentRoute === 'workflow-validation');
  }

  function boot(attempt) {
    render();
    if (!document.getElementById(cardId) && attempt !== 12) {
      setTimeout(function () { boot(attempt + 1); }, 250);
    }
  }

  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', function () { boot(0); });
  } else {
    boot(0);
  }

  window.addEventListener('hashchange', function () { setTimeout(render, 60); });
})();

  function projectPulse030FindTokenInStorage(storage) {
    if (!storage) return '';

    var knownKeys = [
      'projectPulseAuthSession',
      'projectPulseSession',
      'projectPulseSessionToken',
      'projectPulseSessionState',
      'projectPulseUserSession',
      'authSession',
      'sessionToken'
    ];

    for (var i = 0; i < knownKeys.length; i += 1) {
      var key = knownKeys[i];
      var raw = storage.getItem(key) || '';
      var parsed = projectPulse030ReadJsonStorage(key, storage);
      var token = parsed.sessionToken ||
        parsed.token ||
        parsed.accessToken ||
        parsed.projectPulseSessionToken ||
        parsed.session_token ||
        raw;

      if (token && String(token).length > 20) {
        return String(token);
      }
    }

    for (var index = 0; index < storage.length; index += 1) {
      var storageKey = storage.key(index);
      var rawValue = storage.getItem(storageKey) || '';
      var parsedValue = projectPulse030ReadJsonStorage(storageKey, storage);
      var discovered = parsedValue.sessionToken ||
        parsedValue.token ||
        parsedValue.accessToken ||
        parsedValue.projectPulseSessionToken ||
        parsedValue.session_token;

      if (discovered && String(discovered).length > 20) {
        return String(discovered);
      }

      if (rawValue && rawValue.length > 20 && rawValue.length < 500 && /^[A-Za-z0-9._-]+$/.test(rawValue)) {
        return rawValue;
      }
    }

    return '';
  }

  function projectPulse030AuthHeaders() {

    try {

    } catch {

    if (token) {
      headers['X-Project Health Dashboard-Session'] = token;

    var viewAsUser = '';
    try {

        '';
    } catch {
      viewAsUser = '';
    }

    if (viewAsUser) {
      headers['X-Project Health Dashboard-View-As-User'] = viewAsUser;
    }

    return headers;
  }

  async function loadFilterOptions(force) {
    if (filterOptionsLoading) return;
    if (!force && filterOptionsLoaded) return;

    filterOptionsLoading = true;
    filterOptionsAttempted = true;
    filterOptionsLastError = '';

    try {
      var response = await fetch('/api/reports/030/filter-options?_ts=' + Date.now(), {
        headers: projectPulse030AuthHeaders(),
        credentials: 'include',
        cache: 'no-store'
      });

      var payload = await response.json().catch(function () {
        return {};
      });

      if (!response.ok || !payload || !payload.databaseBacked) {
        filterOptionsLoaded = false;
        filterOptionsLastError = payload && payload.message
          ? payload.message
          : 'Filter lists could not be loaded from the database. HTTP ' + response.status;

        state.statusType = 'warning';
        state.status = filterOptionsLastError;
        saveState();
        renderShell();
        return;
      }

      [
        'customers',
        'projects',
        'pms',
        'engineers',
        'selectedEngineers',
        'teams',
        'organizations',
        'contractTypes',
        'billableOptions',
        'workLocations',
        'workCodes'
      ].forEach(function (key) {
        if (Array.isArray(payload[key]) && payload[key].length) {
          filterOptions[key] = payload[key];
        }
      });

      filterOptionsLoaded = true;
      filterOptionsAttempted = false;
      filterOptionsLastError = '';

      [
        { key: 'customer', all: 'All customers', options: filterOptions.customers },
        { key: 'project', all: 'All projects', options: filterOptions.projects },
        { key: 'pm', all: 'All PMs', options: filterOptions.pms },
        { key: 'engineer', all: 'All engineers', options: filterOptions.engineers },
        { key: 'team', all: 'All teams', options: filterOptions.teams },
        { key: 'organization', all: 'All organizations', options: filterOptions.organizations },
        { key: 'contractType', all: 'All contract types', options: filterOptions.contractTypes },
        { key: 'billableStatus', all: 'All billable statuses', options: filterOptions.billableOptions },
        { key: 'workLocation', all: 'All work locations', options: filterOptions.workLocations },
        { key: 'workCode', all: 'All work codes', options: filterOptions.workCodes }
      ].forEach(function (mapping) {
        var values = (mapping.options || []).map(filterOptionValue);
        if (!values.includes(state[mapping.key])) {

      state.statusType = 'success';
      state.status = 'Database filter lists loaded: ' +
        (filterOptions.customers || []).length + ' customers, ' +
        (filterOptions.projects || []).length + ' projects, ' +
        (filterOptions.pms || []).length + ' PMs, ' +
        (filterOptions.engineers || []).length + ' engineers, ' +

      saveState();
      renderShell();
      setTimeout(projectPulse030ApplyFilterOptionsToVisibleDom, 0);

      state.statusType = 'warning';
      state.status = filterOptionsLastError;

    } finally {

    var csv = [

      return headers.map(function (_, index) {
        return csvEscape(Array.isArray(row) ? row[index] : '');
      }).join(',');
    })).join('\n');

    var blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
    var url = URL.createObjectURL(blob);
    var safeName = String(state.reportType || 'report')
      .toLowerCase()
      .replace(/[^a-z0-9]+/g, '-')
      .replace(/^-+|-+$/g, '') || 'report';

    var anchor = document.createElement('a');
    var filename = safeName + '-' + new Date().toISOString().slice(0, 10) + '.csv';

    anchor.href = url;
    anchor.download = filename;
    document.body.appendChild(anchor);
    anchor.click();
    anchor.remove();
    URL.revokeObjectURL(url);

    state.lastExportLayout =
      'CSV Export Generated\n\n' +
      'Report Type: ' + state.reportType + '\n' +
      'Rows Exported: ' + rows.length + '\n' +
      'Columns Exported: ' + headers.length + '\n' +
      'Export File: ' + filename;

    state.statusType = 'success';
    state.status = 'CSV export generated for ' + rows.length + ' visible report rows.';
    saveState();
    renderShell();

  function totals() {
    var rows = reportRows();
    var headers = reportHeaders();

    function indexOfAny(names) {
      for (var i = 0; i < names.length; i++) {
        var index = headers.findIndex(function (header) {
          return String(header || '').toLowerCase().includes(names[i]);
        });

        if (index >= 0) return index;
      }

      return -1;
    }

    var hoursIndex = indexOfAny(['hour', 'quantity']);
    var amountIndex = indexOfAny(['amount', 'total', 'invoice ready', 'invoiced']);

    var totalHours = hoursIndex >= 0
      ? rows.reduce(function (sum, row) { return sum + (Number(row[hoursIndex]) || 0); }, 0)
      : 0;

    var totalAmount = amountIndex >= 0
      ? rows.reduce(function (sum, row) { return sum + (Number(String(row[amountIndex]).replace(/[^0-9.-]/g, '')) || 0); }, 0)
      : 0;

    var exceptions = rows.filter(function (row) {
      return row.some(function (value) {
        value = String(value || '').toLowerCase();
        return value.includes('exception') ||
          value.includes('undefined') ||
          value.includes('missing') ||
          value.includes('pending') ||
          value.includes('required') ||
          value.includes('forbidden') ||
          value.includes('credit') ||
          value.includes('needs review') ||
          value.includes('failed');
      });
    }).length;

    return {
      rows: rows.length,
      hours: totalHours,
      amount: totalAmount,
      healthy: 0,
      exceptions: exceptions
    };

  async function generateReportPreview() {
    captureInputs();

    state.statusType = '';
    state.status = 'Generating database-backed report preview from database rows only.';
    saveState();
    renderShell();

    try {
      var session = {};
      try {
        session = JSON.parse(window.localStorage.getItem('projectPulseAuthSession') || '{}');
      } catch {}

      var headers = {
        'Content-Type': 'application/json'
      };

      if (session.sessionToken) {
        headers['X-Project Health Dashboard-Session'] = session.sessionToken;
      }

      var response = await fetch('/api/reports/030/preview', {
        method: 'POST',
        headers: headers,
        body: JSON.stringify({
          reportType: state.reportType,
          periodPreset: state.periodPreset,
          dateBasis: state.dateBasis,
          startDate: state.startDate,
          endDate: state.endDate,
          fiscalPeriod: state.fiscalPeriod,
          customer: state.customer,
          project: state.project,
          pm: state.pm,
          engineer: state.engineer,
          selectedEngineers: state.selectedEngineers,
          team: state.team,
          organization: state.organization,
          contractType: state.contractType,
          billableStatus: state.billableStatus,
          timeEntryStatus: state.timeEntryStatus,
          approvalStatus: state.approvalStatus,
          invoiceStatus: state.invoiceStatus,
          workCode: state.workCode,
          workLocation: state.workLocation,
          externalConnection: state.externalConnection,
          apiArea: state.apiArea,
          authEvent: state.authEvent,
          systemComponent: state.systemComponent,
          groupBy: state.groupBy,
          exportFormat: state.exportFormat
        })
      });

      var payload = await response.json().catch(function () {
        return { message: 'Report API returned a non-JSON response.', rows: [], columns: [] };
      });

      if (!response.ok) {
        throw new Error(payload.message || ('Report API failed with HTTP ' + response.status));
      }

      state.databaseReport = payload;
      state.lastPreview =
        'Database-Backed Report Preview\n\n' +
        'Report Type: ' + state.reportType + '\n' +
        'Source Table: ' + (payload.sourceTable || 'No matching source table') + '\n' +
        'Rows Returned: ' + (payload.rowCount || 0) + '\n\n' +
        (payload.message || 'Database-backed report generated.') + '\n\n' +
        'This view only displays database-backed users, customers, PMs, engineers, teams, or invoices returned by the API.';

      state.criteriaBuilderConfirmed = true;

      if (String(state.reportType).includes('Time')) state.timeReportingConfirmed = true;
      if (String(state.reportType).includes('Accounting') || String(state.reportType).includes('Invoice')) state.accountingInvoicingConfirmed = true;
      if (state.customer || state.project || state.pm || state.engineer || state.selectedEngineers) state.customerProjectPmEngineerConfirmed = true;
      if (state.team || state.organization) state.teamOrganizationConfirmed = true;
      if (String(state.reportType).includes('System') || String(state.reportType).includes('API') || String(state.reportType).includes('External') || String(state.reportType).includes('Authentication')) state.systemApiExternalAuthConfirmed = true;

      state.statusType = payload.rowCount > 0 ? 'success' : 'warning';
      state.status = payload.rowCount > 0
        ? 'Database-backed report generated from ' + payload.sourceTable + '.'
        : (payload.message || 'No matching database rows found.');

      saveState();
      renderShell();
    } catch (error) {
      state.databaseReport = {
        columns: ['Error'],
        rows: [],
        rowCount: 0,
        sourceTable: '',
        message: error.message || 'Unknown report generation error.'
      };

      state.lastPreview =
        'Database-Backed Report Preview Failed\n\n' +
        (error.message || 'Unknown report generation error.') + '\n\n' +
        'No matching database rows were returned.';

      state.statusType = 'error';
      state.status = error.message || 'Report generation failed.';
      saveState();
      renderShell();
    }
  }

  function projectPulse030SetSelectDomOptions(shell, field, options, allValue) {
    var select = shell.querySelector('[data-030-field="' + field + '"]');
    if (!select || !Array.isArray(options) || options.length < 1) return 0;

    var current = select.value || allValue || filterOptionValue(options[0]);
    var values = options.map(filterOptionValue);
    var nextValue = values.includes(current) ? current : filterOptionValue(options[0]);

    select.innerHTML = options.map(function (option) {
      var value = filterOptionValue(option);
      var label = filterOptionLabel(option);
      if (!label && value) label = value;
      if (!value && label) value = label;
      return '<option value="' + escapeHtml(value) + '">' + escapeHtml(label) + '</option>';
    }).join('');

    select.value = nextValue;
    select.setAttribute('data-030-direct-hydrated', String(options.length));
    return options.length;
  }

  function projectPulse030RenderSelectedEngineerDom(shell) {
    var container = shell.querySelector('[data-030-selected-engineers-dropdown]');
    var field = shell.querySelector('[data-030-field="selectedEngineers"]');
    var wrapper = null;

    if (container) {
      wrapper = container.parentElement;
    } else {
      var labels = Array.from(shell.querySelectorAll('.projectpulse-030-field label'));
      var selectedLabel = labels.find(function (label) {
        return String(label.textContent || '').trim().toLowerCase() === 'selected engineers';
      });
      wrapper = selectedLabel ? selectedLabel.parentElement : null;
    }

    if (!wrapper) return 0;

    var html = selectedEngineerCheckboxHtml();
    var existingLabel = wrapper.querySelector('label');
    wrapper.innerHTML = '<label>Selected Engineers</label>' + html;

    return (filterOptions.selectedEngineers || filterOptions.engineers || []).length;
  }

  async function projectPulse030ForceBrowserFilterLoad() {
    var headers = projectPulse030AuthHeaders();
    var tokenPresent = !!headers['X-Project Health Dashboard-Session'];
    state.browserFilterDiagnostic = 'Requesting /api/reports/030/filter-options. Token header present: ' + (tokenPresent ? 'yes' : 'no') + '.';
    state.statusType = '';
    state.status = state.browserFilterDiagnostic;
    saveState();
    renderShell();

    try {
      var response = await fetch('/api/reports/030/filter-options?_ts=' + Date.now(), {
        headers: headers,
        credentials: 'include',
        cache: 'no-store'
      });

      var rawText = await response.text();
      var payload = {};

      try {
        payload = rawText ? JSON.parse(rawText) : {};
      } catch {
        payload = {};
      }

      if (!response.ok || !payload || !payload.databaseBacked) {
        state.browserFilterDiagnostic = 'FAILED: HTTP ' + response.status + '. Token header present: ' + (tokenPresent ? 'yes' : 'no') + '. Response preview: ' + rawText.slice(0, 180);
        state.statusType = 'warning';
        state.status = state.browserFilterDiagnostic;
        saveState();
        renderShell();
        return;
      }

      [
        'customers',
        'projects',
        'pms',
        'engineers',
        'selectedEngineers',
        'teams',
        'organizations',
        'contractTypes',
        'billableOptions',
        'workLocations',
        'workCodes'
      ].forEach(function (key) {
        if (Array.isArray(payload[key]) && payload[key].length) {
          filterOptions[key] = payload[key];
        }
      });

      filterOptionsLoaded = true;
      filterOptionsAttempted = false;
      filterOptionsLastError = '';

      state.browserFilterDiagnostic = 'SUCCESS: HTTP ' + response.status +
        '. Customers=' + (filterOptions.customers || []).length +
        ', Projects=' + (filterOptions.projects || []).length +
        ', PMs=' + (filterOptions.pms || []).length +
        ', Engineers=' + (filterOptions.engineers || []).length +
        ', Selected Engineers=' + (filterOptions.selectedEngineers || []).length +
        ', Teams=' + (filterOptions.teams || []).length + '.';

      state.statusType = 'success';
      state.status = state.browserFilterDiagnostic;
      saveState();
      renderShell();

      setTimeout(projectPulse030ApplyFilterOptionsToVisibleDom, 0);
      setTimeout(projectPulse030ApplyFilterOptionsToVisibleDom, 250);
    } catch (error) {
      state.browserFilterDiagnostic = 'FAILED: ' + (error && error.message ? error.message : 'Unknown browser fetch error.');
      state.statusType = 'warning';
      state.status = state.browserFilterDiagnostic;
      saveState();
      renderShell();
    }
  }

    [

    var exportNode = shell.querySelector('[data-030-export-output]');

    var readinessNode = shell.querySelector('[data-030-readiness-output]');
    var statusNode = shell.querySelector('[data-030-status]');

    if (readinessNode) readinessNode.textContent = state.lastReadiness || readinessSummary();

    if (statusNode) {

        ? '<div class="projectpulse-030-status ' + escapeHtml(state.statusType || '') + '">' + escapeHtml(state.status) + '</div>'
        : '';
    }

  function wireShell(shell) {
    shell.querySelectorAll('input, select, textarea').forEach(function (input) {
      input.addEventListener('input', function () {
        captureInputs();
        renderShell();
      });
      input.addEventListener('change', function () {
        captureInputs();
        renderShell();
      });
    });

    shell.querySelector('[data-030-dashboard]').addEventListener('click', function () {
      window.location.hash = '#dashboard';
      render();
    });

    shell.querySelector('[data-030-clear]').addEventListener('click', function () {
      if (!confirm('Clear MODULE 030 preview state on this browser?')) return;
      window.localStorage.removeItem(storageKey);
      location.reload();
    });

    shell.querySelector('[data-030-generate]').addEventListener('click', generateReportPreview);
    var refreshFiltersButton = shell.querySelector('[data-030-refresh-filters]');
    if (refreshFiltersButton) {
      refreshFiltersButton.addEventListener('click', function () {
        filterOptionsLoaded = false;
        filterOptionsAttempted = false;
        filterOptionsLastError = '';
        projectPulse030ForceBrowserFilterLoad();
      });
    }

    var forceBrowserFiltersButton = shell.querySelector('[data-030-force-browser-filters]');
    if (forceBrowserFiltersButton) {
      forceBrowserFiltersButton.addEventListener('click', function () {
        filterOptionsLoaded = false;
        filterOptionsAttempted = false;
        filterOptionsLastError = '';
        projectPulse030ForceBrowserFilterLoad();
      });
    }
    shell.querySelector('[data-030-csv-export]').addEventListener('click', exportVisibleReportCsv);
    if (!shell.projectPulse030bSelectionHandlerAttached) {
      shell.addEventListener('change', function (event) {
        var target = event.target;
        if (!target) return;

        if (target.matches('[data-030-selected-engineer-all]')) {
          if (target.checked) {
            shell.querySelectorAll('[data-030-selected-engineer]').forEach(function (element) {
              element.checked = false;
            });
          }
          captureInputs();
          updateSelectedEngineerSummary(shell);
        }

        if (target.matches('[data-030-selected-engineer]')) {
          var all = shell.querySelector('[data-030-selected-engineer-all]');
          if (all) all.checked = false;
          captureInputs();
          updateSelectedEngineerSummary(shell);
        }
      });

      shell.projectPulse030bSelectionHandlerAttached = true;
    }
    shell.querySelector('[data-030-csv-export]').addEventListener('click', exportVisibleReportCsv);
    shell.querySelector('[data-030-generate-top]').addEventListener('click', generateReportPreview);
    shell.querySelector('[data-030-csv-export]').addEventListener('click', exportVisibleReportCsv);
    shell.querySelector('[data-030-csv-export]').addEventListener('click', exportVisibleReportCsv);
    shell.querySelector('[data-030-export]').addEventListener('click', buildExportLayout);
    shell.querySelector('[data-030-save-definition]').addEventListener('click', saveReportDefinition);
    shell.querySelector('[data-030-readiness]').addEventListener('click', validateReadiness);
  }

    loadState();
    ensureShell();
    ensureCard();
    var currentRoute = route();
    openShell(currentRoute === 'reporting' || currentRoute === 'reports' || currentRoute === 'analytics' || currentRoute === 'executive-reporting');
  }

  function boot(attempt) {
    render();
    if (!document.getElementById(cardId) && attempt !== 12) {

    }
  }

  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', function () { boot(0); });
  } else {
    boot(0);
  }

  window.addEventListener('hashchange', function () { setTimeout(render, 60); });
})();
