<script id="projectpulse-025m-script">
(function () {
  if (window.__projectPulse025MInstalled) return;
  window.__projectPulse025MInstalled = true;

  const cardId = 'projectpulse-025-sow-card';
  const shellId = 'projectpulse-025m-shell';
  const pageId = 'projectpulse-025m-page';
  const storageKey = 'projectpulse025MStandaloneDraft';
  const customers = [{"id": "great-lakes-healthcare", "name": "Great Lakes Healthcare", "code": "GLH"}, {"id": "summit-manufacturing", "name": "Summit Manufacturing", "code": "SMFG"}];

  const sectionKeys = ['executiveSummary', 'projectScope', 'deliverables', 'assumptions', 'exclusions', 'handoffNotes'];
  const labels = {
    executiveSummary: 'Executive Summary',
    projectScope: 'Project Scope',
    deliverables: 'Deliverables',
    assumptions: 'Assumptions',
    exclusions: 'Exclusions',
    handoffNotes: 'Sales-to-Delivery Handoff Notes'
  };

  const state = {
    customerId: customers[0] ? customers[0].id : '',
    customerName: customers[0] ? customers[0].name : '',
    projectName: '',
    crmSource: 'Manual / Existing ProjectPulse Customer',
    opportunityRef: '',
    quoteRef: '',
    solutionArchitect: '',
    salesOwner: '',
    projectType: 'Professional Services',
    requestedTimeline: '',
    templateName: '',
    templateVersion: 'v1',
    templateFileName: '',
    signedSowFileName: '',
    gsdFileName: '',
    highLevelDescription: '',
    researchBrief: '',
    sections: {},
    status: '',
    statusType: '',
    reviewComplete: false,
    scopeAccuracyReviewed: false,
    assumptionsReviewed: false,
    exclusionsReviewed: false,
    hallucinationReviewed: false,
    canonicalDocsReviewed: false,
    researchReviewed: false,
    readyForSignedHandoff: false,
    handoffSaved: false
  };

  sectionKeys.forEach(function (key) { state.sections[key] = ''; });

  function escapeHtml(value) {
    return String(value == null ? '' : value)
      .replaceAll('&', '&amp;')
      .replaceAll('<', '&lt;')
      .replaceAll('>', '&gt;')
      .replaceAll('"', '&quot;')
      .replaceAll("'", '&#039;');
  }

  function cleanText(value) {
    return String(value || '').replace(/\s+/g, ' ').trim();
  }

  function loadState() {
    try {
      const raw = window.localStorage.getItem(storageKey);
      if (!raw) return;
      const saved = JSON.parse(raw);
      Object.assign(state, saved);
      state.sections = Object.assign({}, state.sections, saved.sections || {});
      if (!state.customerId && customers[0]) {
        state.customerId = customers[0].id;
        state.customerName = customers[0].name;
      }
    } catch {}
  }

  function saveState() {
    try { window.localStorage.setItem(storageKey, JSON.stringify(state)); } catch {}
  }

  function route() {
    return String(window.location.hash || '#dashboard').replace(/^#/, '').split('?')[0].toLowerCase();
  }

  function getDashboardGrid() {
    const notificationCard = document.getElementById('projectpulse-022e-dashboard-notification-card');
    if (notificationCard && notificationCard.parentElement) return notificationCard.parentElement;

    const candidates = Array.from(document.querySelectorAll('section, article, div, main'))
      .filter(function (element) {
        if (element.id === cardId || element.closest('#' + cardId)) return false;
        const text = cleanText(element.textContent);
        const rect = element.getBoundingClientRect();
        return rect.width > 700 &&
          rect.height > 250 &&
          text.includes('Project Workload') &&
          text.includes('Project Workspace') &&
          text.includes('Project Intake');
      })
      .sort(function (a, b) {
        const ar = a.getBoundingClientRect();
        const br = b.getBoundingClientRect();
        return (ar.width * ar.height) - (br.width * br.height);
      });

    return candidates[0] || null;
  }

  function ensureCard() {
    const grid = getDashboardGrid();
    if (!grid) return null;

    let card = document.getElementById(cardId);
    if (!card) {
      card = document.createElement('section');
      card.id = cardId;
      card.innerHTML =
        '<div class="projectpulse-025-eyebrow">Module 025</div>' +
        '<h3>SOW Generator + Claude Research Review</h3>' +
        '<p>Create research-backed SOW scope and deliverables from Solution Architect input, reuse SOW/GSD project documents, and prepare Sales-to-Delivery handoff.</p>' +
        '<div class="projectpulse-025-actions">' +
          '<button type="button" class="projectpulse-025-button primary" data-025-open>Open SOW Generator</button>' +
          '<span class="projectpulse-025-pill green">Dashboard module</span>' +
          '<span class="projectpulse-025-pill amber">Research-backed draft</span>' +
          '<span class="projectpulse-025-pill blue">SOW/GSD reused</span>' +
        '</div>';

      const notificationCard = document.getElementById('projectpulse-022e-dashboard-notification-card');
      if (notificationCard && notificationCard.parentElement === grid) {
        grid.insertBefore(card, notificationCard.nextSibling);
      } else {
        grid.insertBefore(card, grid.firstElementChild || null);
      }

      card.querySelector('[data-025-open]').addEventListener('click', function () {
        window.location.hash = '#sow-generator';
        render();
      });
    }

    return card;
  }

  function ensureShell() {
    let shell = document.getElementById(shellId);
    if (!shell) {
      shell = document.createElement('div');
      shell.id = shellId;
      shell.setAttribute('aria-label', 'SOW Generator route');
      document.body.appendChild(shell);
    }
    return shell;
  }

  function openShell(open) {
    const shell = ensureShell();
    if (open) {
      shell.setAttribute('data-open', 'true');
      document.documentElement.style.overflow = 'hidden';
      document.body.style.overflow = 'hidden';
      renderShell();
      setTimeout(function () { shell.scrollTop = 0; }, 0);
    } else {
      shell.removeAttribute('data-open');
      document.documentElement.style.overflow = '';
      document.body.style.overflow = '';
    }
  }

  function setValue(root, name, value) {
    const element = root.querySelector('[data-025-field="' + name + '"]');
    if (element) element.value = value || '';
  }

  function setCheck(root, name, value) {
    const element = root.querySelector('[data-025-check="' + name + '"]');
    if (element) element.checked = !!value;
  }

  function captureInputs() {
    const shell = document.getElementById(shellId);
    if (!shell || shell.getAttribute('data-open') !== 'true') return;

    function get(name) {
      const element = shell.querySelector('[data-025-field="' + name + '"]');
      return element ? element.value : '';
    }

    function checked(name) {
      const element = shell.querySelector('[data-025-check="' + name + '"]');
      return !!(element && element.checked);
    }

    state.customerId = get('customerId');
    const customer = customers.find(function (item) { return item.id === state.customerId; });
    state.customerName = customer ? customer.name : state.customerName;

    ['projectName', 'crmSource', 'opportunityRef', 'quoteRef', 'solutionArchitect', 'salesOwner', 'projectType', 'requestedTimeline', 'templateName', 'templateVersion', 'highLevelDescription'].forEach(function (key) {
      state[key] = get(key);
    });

    sectionKeys.forEach(function (key) {
      const element = shell.querySelector('[data-025-section="' + key + '"]');
      if (element) state.sections[key] = element.value;
    });

    state.researchReviewed = checked('researchReviewed');
    state.reviewComplete = checked('reviewComplete');
    state.scopeAccuracyReviewed = checked('scopeAccuracyReviewed');
    state.assumptionsReviewed = checked('assumptionsReviewed');
    state.exclusionsReviewed = checked('exclusionsReviewed');
    state.hallucinationReviewed = checked('hallucinationReviewed');
    state.canonicalDocsReviewed = checked('canonicalDocsReviewed');
    state.readyForSignedHandoff = checked('readyForSignedHandoff');

    saveState();
  }

  function classifyWorkType() {
    const text = (state.highLevelDescription + ' ' + state.projectName + ' ' + state.projectType).toLowerCase();
    if (text.includes('cucm') || text.includes('call manager') || text.includes('collaboration') || text.includes('voice')) return 'Cisco UC / Voice Platform Migration or Upgrade';
    if (text.includes('firewall') || text.includes('asa') || text.includes('fortinet') || text.includes('palo alto')) return 'Firewall / Security Platform Implementation or Migration';
    if (text.includes('contact center') || text.includes('uccx') || text.includes('webex contact')) return 'Contact Center Implementation or Migration';
    if (text.includes('server') || text.includes('vmware') || text.includes('storage') || text.includes('backup')) return 'Systems / Server / Storage Implementation';
    if (text.includes('service request')) return 'Service Request / Scoped Professional Services Task';
    return 'Professional Services Delivery Engagement';
  }

  function researchStepsForWorkType(workType) {
    if (workType.includes('Cisco UC')) {
      return [
        'Confirm source and target application versions, supported migration path, and required intermediate versions or migration method.',
        'Review official vendor upgrade and migration documentation for compatibility, supported direct upgrades, migration tooling, and release-specific caveats.',
        'Validate dependent systems such as Unity Connection, UCCX, Expressway, CUBE/gateways, E911, call recording, paging, SIP trunks, certificates, and integrations.',
        'Perform readiness checks: backups, database replication, NTP/DNS, VM sizing, licensing, phone firmware, COP files, device compatibility, and supported operating environment.',
        'Create migration or upgrade plan covering pre-change checks, implementation sequence, cutover, rollback, testing, and post-change validation.',
        'Execute implementation activities during an approved maintenance window and validate registration, calling, voicemail, contact center, emergency calling, routing, and monitoring.',
        'Document results, risks, exceptions, open items, and handoff instructions.'
      ];
    }

    if (workType.includes('Firewall')) {
      return [
        'Identify current firewall platform, target platform/version, licensing, interface design, routing, NAT, VPN, security policies, and logging requirements.',
        'Review vendor migration and deployment documentation for supported conversion methods, policy mapping, feature parity, and high-availability requirements.',
        'Collect current configuration, rulebase, object groups, NAT rules, VPN settings, routes, certificates, and dependencies.',
        'Create implementation plan covering staging, policy validation, migration/conversion, testing, cutover, rollback, and monitoring.',
        'Validate traffic flows, VPN connectivity, NAT behavior, security logging, failover, and customer acceptance criteria.',
        'Document final configuration, known exceptions, and operational handoff.'
      ];
    }

    if (workType.includes('Contact Center')) {
      return [
        'Confirm source/target contact center platform, call flows, queues, agents, supervisors, reporting, recording, IVR, CRM integrations, and telephony dependencies.',
        'Review vendor implementation and migration documentation for supported configuration, integration, and cutover methods.',
        'Capture current call flows, scripts, prompts, routing logic, user roles, and reporting needs.',
        'Build implementation plan covering design, configuration, testing, agent validation, supervisor validation, cutover, rollback, and handoff.',
        'Validate inbound/outbound calls, queue routing, agent login, reporting, recordings, integrations, and post-cutover support.'
      ];
    }

    if (workType.includes('Systems')) {
      return [
        'Confirm current infrastructure, target architecture, workloads, dependencies, backup posture, capacity, licensing, and maintenance windows.',
        'Review vendor implementation documentation for supported versions, compatibility, sizing, prerequisites, and migration process.',
        'Build deployment plan covering staging, migration, testing, rollback, monitoring, and customer acceptance.',
        'Validate workload availability, performance, backup/restore, access, monitoring, and handoff documentation.'
      ];
    }

    if (workType.includes('Service Request')) {
      return [
        'Clarify the requested service outcome, affected systems, acceptance criteria, risk level, change window, and customer dependencies.',
        'Review relevant product/vendor documentation or internal implementation standards for the specific request.',
        'Define scope boundaries, implementation tasks, validation steps, rollback approach, and customer handoff items.',
        'Complete the approved service activity, validate results, document work performed, and identify follow-up actions.'
      ];
    }

    return [
      'Classify the engagement type based on the Solution Architect description and customer objective.',
      'Research the actual delivery process using official/vendor documentation, internal standards, and known implementation practices.',
      'Identify prerequisites, dependencies, scope boundaries, implementation phases, validation requirements, assumptions, exclusions, and handoff requirements.',
      'Convert the researched process into SOW scope, deliverables, assumptions, exclusions, and acceptance criteria.',
      'Require Solution Architect review before any SOW language is finalized.'
    ];
  }

  function generateResearchBrief() {
    captureInputs();

    const workType = classifyWorkType();
    const steps = researchStepsForWorkType(workType);
    const description = state.highLevelDescription || '[High-level SA description required before final research]';

    state.researchBrief =
      'Process Research Brief\n\n' +
      'Detected work type: ' + workType + '\n\n' +
      'Solution Architect description:\n' + description + '\n\n' +
      'Research-backed drafting approach:\n' +
      'In the backend version, ProjectPulse should call the shared Claude provider with web/retrieval-enabled research. Claude should search official vendor/product documentation first, then trusted implementation references, and should return source-backed findings before drafting SOW language.\n\n' +
      'Recommended delivery process steps:\n' +
      steps.map(function (step, index) { return (index + 1) + '. ' + step; }).join('\n') +
      '\n\nItems requiring Solution Architect review:\n' +
      '- Confirm product versions, licensing, dependencies, and supported implementation path.\n' +
      '- Confirm customer responsibilities, access requirements, maintenance window, and rollback expectations.\n' +
      '- Confirm integrations, exclusions, and scope boundaries.\n' +
      '- Confirm that no Claude-generated item is treated as final until reviewed by the Solution Architect.\n\n' +
      'Source handling expectation for backend build:\n' +
      '- Store the research run, research summary, sources reviewed, and final SA-reviewed edits.\n' +
      '- Use the research brief to populate Project Scope and Deliverables.\n';

    state.statusType = 'success';
    state.status = 'Process Research Brief generated. Use Generate SOW Draft from Research to create scope and deliverables from this brief.';
    saveState();
    renderShell();
  }

  function seedSection(key) {
    const customer = state.customerName || '[Customer]';
    const project = state.projectName || '[Project]';
    const description = state.highLevelDescription || '[High-level SA description required]';
    const brief = state.researchBrief || 'Research brief has not been generated yet.';
    const workType = classifyWorkType();

    const map = {
      executiveSummary:
        'This Statement of Work draft is prepared for ' + customer + ' for the ' + project + ' engagement.\n\n' +
        'Detected work type: ' + workType + '\n\n' +
        'High-level business and technical intent:\n' + description + '\n\n' +
        'This draft is based on the Process Research Brief and must be reviewed by the Solution Architect before external use.',

      projectScope:
        'The project scope includes activities required to deliver the agreed solution for ' + customer + ' under ' + project + '.\n\n' +
        'Research-backed scope basis:\n' + brief + '\n\n' +
        'Scope drafting rule:\nProject scope must be based on the researched delivery process, customer-approved quote/context, signed SOW/GSD, and Solution Architect review. Unsupported or unclear items must be excluded or flagged for review.',

      deliverables:
        'Draft deliverables for ' + project + ':\n' +
        researchStepsForWorkType(workType).map(function (step, index) { return (index + 1) + '. ' + step; }).join('\n') +
        '\n\nDeliverables must be adjusted by the Solution Architect to match the quote, signed SOW, approved GSD, and customer expectations.',

      assumptions:
        'Draft assumptions:\n' +
        '1. Customer stakeholders will provide timely access, approvals, and required technical information.\n' +
        '2. The approved GSD represents the current technical design baseline.\n' +
        '3. Work outside the signed SOW requires review before assignment.\n' +
        '4. ProjectPulse will use the canonical SOW/GSD document area as the source of truth.\n' +
        '5. Claude research output is draft-only and requires Solution Architect review.',

      exclusions:
        'Draft exclusions:\n' +
        '1. Work not explicitly included in the signed SOW or approved GSD.\n' +
        '2. Customer environment changes not identified during solution design.\n' +
        '3. Additional integrations, migrations, remediation, licensing, or support activities not included in the quote.\n' +
        '4. Any Claude-generated recommendation not verified by the Solution Architect.\n' +
        '5. Any vendor/product work that is unsupported by current official guidance.',

      handoffNotes:
        'Sales-to-Delivery handoff notes:\n' +
        '- CRM source: ' + state.crmSource + '\n' +
        '- Quote/opportunity reference: ' + (state.quoteRef || state.opportunityRef || '[Reference]') + '\n' +
        '- Solution Architect: ' + (state.solutionArchitect || '[Solution Architect]') + '\n' +
        '- Project type: ' + state.projectType + '\n' +
        '- Detected work type: ' + workType + '\n' +
        '- Signed SOW and GSD remain in the existing Project Hours / SOW-GSD / Engineer Allocation document area.\n' +
        '- Once Sales marks the SOW signed and uploads the signed SOW/GSD, ProjectPulse should notify PTC and Executive stakeholders.'
    };

    return map[key] || '';
  }

  function generateDraftFromResearch() {
    captureInputs();

    if (!state.researchBrief) {
      const workType = classifyWorkType();
      const steps = researchStepsForWorkType(workType);
      state.researchBrief =
        'Process Research Brief\n\nDetected work type: ' + workType + '\n\nRecommended delivery process steps:\n' +
        steps.map(function (step, index) { return (index + 1) + '. ' + step; }).join('\n');
    }

    sectionKeys.forEach(function (key) { state.sections[key] = seedSection(key); });

    state.statusType = 'success';
    state.status = 'SOW draft generated from the Process Research Brief. SA review is required before handoff.';
    saveState();
    renderShell();
  }

  function regenerateSection(key) {
    captureInputs();
    state.sections[key] = seedSection(key) + '\n\nRegenerated section note: This section must be re-reviewed by the Solution Architect.';
    state.statusType = 'warning';
    state.status = labels[key] + ' regenerated from research brief. SA review is required.';
    saveState();
    renderShell();
  }

  function saveReview() {
    captureInputs();

    const complete = state.reviewComplete &&
      state.scopeAccuracyReviewed &&
      state.assumptionsReviewed &&
      state.exclusionsReviewed &&
      state.hallucinationReviewed &&
      state.canonicalDocsReviewed &&
      state.researchReviewed;

    state.statusType = complete ? 'success' : 'warning';
    state.status = complete
      ? 'SA review checklist is complete. Research-backed SOW draft is ready for Word output and signed handoff.'
      : 'Draft saved, but one or more SA review safeguards are incomplete.';

    saveState();
    renderShell();
  }

  function triggerHandoff() {
    captureInputs();

    const missing = [];
    if (!state.customerName) missing.push('customer');
    if (!state.projectName) missing.push('project name');
    if (!state.solutionArchitect) missing.push('solution architect');
    if (!state.researchReviewed) missing.push('research review');
    if (!state.signedSowFileName) missing.push('signed SOW');
    if (!state.gsdFileName) missing.push('GSD');
    if (!state.reviewComplete) missing.push('SA review');
    if (!state.canonicalDocsReviewed) missing.push('canonical document review');

    if (missing.length) {
      state.statusType = 'error';
      state.status = 'Cannot save handoff yet. Missing: ' + missing.join(', ') + '.';
    } else {
      state.readyForSignedHandoff = true;
      state.handoffSaved = true;
      state.statusType = 'success';
      state.status = 'Handoff saved in demo mode. Backend wiring will trigger email to PTC and Executive, then assignment email to PM/Engineer(s) with SOW/GSD.';
    }

    saveState();
    renderShell();
  }

  function wordHtml() {
    const title = 'SOW Draft - ' + (state.customerName || 'Customer') + ' - ' + (state.projectName || 'Project');
    const template = state.templateFileName || state.templateName || 'Default ProjectPulse SOW Template';
    let sections = '';

    sections += '<h2>Process Research Brief</h2><p>' + escapeHtml(state.researchBrief || 'No research brief generated.').replace(/\n/g, '<br>') + '</p>';

    sectionKeys.forEach(function (key) {
      sections += '<h2>' + escapeHtml(labels[key]) + '</h2><p>' + escapeHtml(state.sections[key] || '').replace(/\n/g, '<br>') + '</p>';
    });

  function downloadWordDraft() {
    captureInputs();

    const blob = new Blob([wordHtml()], { type: 'application/msword;charset=utf-8' });
    const url = URL.createObjectURL(blob);
    const link = document.createElement('a');
    const safeCustomer = (state.customerName || 'customer').replace(/[^a-z0-9]+/gi, '-').replace(/^-|-$/g, '').toLowerCase();
    const safeProject = (state.projectName || 'project').replace(/[^a-z0-9]+/gi, '-').replace(/^-|-$/g, '').toLowerCase();

    link.href = url;
    link.download = safeCustomer + '_' + safeProject + '_research_backed_sow_draft.doc';
    document.body.appendChild(link);
    link.click();
    link.remove();
    URL.revokeObjectURL(url);

    state.statusType = 'success';
    state.status = 'Word-compatible research-backed draft downloaded using ' + (state.templateFileName || state.templateName || 'the default template reference') + '.';

  function populateShellValues(shell) {
    const customerSelect = shell.querySelector('[data-025-field="customerId"]');

      option.value = customer.id;
      option.textContent = customer.code ? customer.name + ' (' + customer.code + ')' : customer.name;
      customerSelect.appendChild(option);
    });

    setValue(shell, 'customerId', state.customerId);
    setValue(shell, 'projectType', state.projectType);
    setValue(shell, 'crmSource', state.crmSource);
    setValue(shell, 'projectName', state.projectName);
    setValue(shell, 'opportunityRef', state.opportunityRef);
    setValue(shell, 'quoteRef', state.quoteRef);
    setValue(shell, 'solutionArchitect', state.solutionArchitect);
    setValue(shell, 'salesOwner', state.salesOwner);
    setValue(shell, 'requestedTimeline', state.requestedTimeline);
    setValue(shell, 'templateName', state.templateName);
    setValue(shell, 'templateVersion', state.templateVersion);
    setValue(shell, 'highLevelDescription', state.highLevelDescription);

    sectionKeys.forEach(function (key) {
      const element = shell.querySelector('[data-025-section="' + key + '"]');
      if (element) element.value = state.sections[key] || '';
    });

    ['researchReviewed', 'reviewComplete', 'scopeAccuracyReviewed', 'assumptionsReviewed', 'exclusionsReviewed', 'hallucinationReviewed', 'canonicalDocsReviewed', 'readyForSignedHandoff'].forEach(function (key) {

    shell.querySelector('[data-025-prompt]').textContent = promptPreview();
    shell.querySelector('[data-025-email]').textContent = emailPreview();

    const status = shell.querySelector('[data-025-status]');
    status.innerHTML = state.status ? '<div class="projectpulse-025-status ' + escapeHtml(state.statusType || '') + '">' + escapeHtml(state.status) + '</div>' : '';
  }

  function wireShell(shell) {
    shell.querySelectorAll('input, select, textarea').forEach(function (input) {
      input.addEventListener('input', captureInputs);
      input.addEventListener('change', captureInputs);
    });

    shell.querySelector('[data-025-template-file]').addEventListener('change', function (event) {
      state.templateFileName = event.target.files && event.target.files[0] ? event.target.files[0].name : '';
      if (!state.templateName && state.templateFileName) state.templateName = state.templateFileName.replace(/\.(docx?|DOCX?)$/, '');
      saveState();
      renderShell();
    });

    shell.querySelector('[data-025-signed-sow-file]').addEventListener('change', function (event) {
      state.signedSowFileName = event.target.files && event.target.files[0] ? event.target.files[0].name : '';
      saveState();
      renderShell();
    });

    shell.querySelector('[data-025-gsd-file]').addEventListener('change', function (event) {
      state.gsdFileName = event.target.files && event.target.files[0] ? event.target.files[0].name : '';
      saveState();
      renderShell();
    });

    shell.querySelector('[data-025-research]').addEventListener('click', generateResearchBrief);
    shell.querySelector('[data-025-generate]').addEventListener('click', generateDraftFromResearch);
    shell.querySelector('[data-025-review-save]').addEventListener('click', saveReview);
    shell.querySelector('[data-025-handoff]').addEventListener('click', triggerHandoff);
    shell.querySelector('[data-025-download]').addEventListener('click', downloadWordDraft);

    shell.querySelector('[data-025-save]').addEventListener('click', function () {
      captureInputs();
      state.statusType = 'success';
      state.status = 'Local Module 025 research-backed review draft saved. Backend persistence will be wired later.';
      saveState();
      renderShell();
    });

    shell.querySelector('[data-025-clear]').addEventListener('click', function () {
      if (!confirm('Clear the current Module 025 draft on this browser?')) return;
      window.localStorage.removeItem(storageKey);
      location.reload();
    });

    shell.querySelector('[data-025-dashboard]').addEventListener('click', function () {
      window.location.hash = '#dashboard';
      render();
    });

    shell.querySelectorAll('[data-025-regenerate]').forEach(function (button) {
      button.addEventListener('click', function () {
        regenerateSection(button.getAttribute('data-025-regenerate'));
      });
    });
  }

  function render() {
    loadState();
    ensureShell();
    ensureCard();
    openShell(route() === 'sow-generator');
  }

  function boot(attempt) {
    render();
    if (!document.getElementById(cardId) && attempt < 12) {
      setTimeout(function () { boot(attempt + 1); }, 250);
    }
  }

  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', function () { boot(0); });
  } else {
    boot(0);
  }

  window.addEventListener('hashchange', function () { setTimeout(render, 60); });
})();

  function escapeHtml(value) {
    return String(value == null ? '' : value)
      .replaceAll('&', '&amp;')
      .replaceAll('<', '&lt;')
      .replaceAll('>', '&gt;')
      .replaceAll('"', '&quot;')
      .replaceAll("'", '&#039;');
  }

  function cleanText(value) {
    return String(value || '').replace(/\s+/g, ' ').trim();
  }

  function loadState() {
    try {
      var raw = window.localStorage.getItem(storageKey);
      if (!raw) return;
      Object.assign(state, JSON.parse(raw));
    } catch {}
  }

  function saveState() {
    try {
      window.localStorage.setItem(storageKey, JSON.stringify(state));
    } catch {}
  }

  function route() {
    return String(window.location.hash || '#dashboard').replace(/^#/, '').split('?')[0].toLowerCase();
  }

  function getDashboardGrid() {
    var crmCard = document.getElementById(cardId);
    if (crmCard && crmCard.parentElement) return crmCard.parentElement;

    var sowCard = document.getElementById('projectpulse-025-sow-card');
    if (sowCard && sowCard.parentElement) return sowCard.parentElement;

    var notificationCard = document.getElementById('projectpulse-022e-dashboard-notification-card');
    if (notificationCard && notificationCard.parentElement) return notificationCard.parentElement;

    var candidates = Array.from(document.querySelectorAll('section, article, div, main'))
      .filter(function (element) {
        if (element.id === cardId || element.closest('#' + cardId)) return false;
        var text = cleanText(element.textContent);
        var rect = element.getBoundingClientRect();
        return rect.width > 700 &&
          rect.height > 250 &&
          text.includes('Project Workload') &&
          text.includes('Project Workspace') &&
          text.includes('Project Intake');
      })
      .sort(function (a, b) {
        var ar = a.getBoundingClientRect();
        var br = b.getBoundingClientRect();
        return (ar.width * ar.height) - (br.width * br.height);
      });

    return candidates[0] || null;
  }

  function ensureCard() {
    var grid = getDashboardGrid();
    if (!grid) return null;

    var card = document.getElementById(cardId);
    if (!card) {
      card = document.createElement('section');

      card.innerHTML =

          '<span class="projectpulse-026-pill blue">CRM to SOW / Intake</span>' +
        '</div>';

      if (sowCard && sowCard.parentElement === grid) {
        grid.insertBefore(card, sowCard.nextSibling);
      } else {
        grid.insertBefore(card, grid.firstElementChild || null);
      }

      card.querySelector('[data-026-open]').addEventListener('click', function () {
        window.location.hash = '#crm-integration';
        render();
      });
    }

    return card;
  }

      shell.setAttribute('aria-label', 'CRM Integration Center route');
      document.body.appendChild(shell);
    }
    return shell;
  }

  function openShell(open) {
    var shell = ensureShell();
    if (open) {
      shell.setAttribute('data-open', 'true');
      document.documentElement.style.overflow = 'hidden';
      document.body.style.overflow = 'hidden';
      renderShell();
      setTimeout(function () { shell.scrollTop = 0; }, 0);
    } else {
      shell.removeAttribute('data-open');
      document.documentElement.style.overflow = '';
      document.body.style.overflow = '';
    }
  }

    var element = root.querySelector('[data-026-field="' + name + '"]');
    if (element) element.value = value || '';

  function setCheck(root, name, value) {
    var element = root.querySelector('[data-026-check="' + name + '"]');
    if (element) element.checked = !!value;
  }

    var shell = document.getElementById(shellId);

    function get(name) {
      var element = shell.querySelector('[data-026-field="' + name + '"]');
      return element ? element.value : '';
    }

    function checked(name) {
      var element = shell.querySelector('[data-026-check="' + name + '"]');
      return !!(element && element.checked);
    }

      'syncMode',
      'salesforceStatus',
      'zendeskSellStatus',
      'selectedScenario',
      'sampleAccount',
      'sampleOpportunity',
      'sampleQuote',
      'crmOwner',
      'solutionArchitect',
      'estimatedHours',
      'estimatedRevenue',
      'sourceRecordReference',
      'serviceSummary'
    ].forEach(function (key) {
      state[key] = get(key);
    });

    [
      'fieldMappingReviewed',
      'securityReviewed',
      'noSecretsReviewed',
      'intakeMappingReviewed',
      'sowMappingReviewed',
      'syncReadinessReviewed',
      'promotionAuditReviewed',
      'providerRegistryReviewed',

                '<label><input type="checkbox" data-026-check="sowMappingReviewed"> CRM-to-SOW Generator mapping reviewed.</label>' +
                '<label><input type="checkbox" data-026-check="intakeMappingReviewed"> CRM-to-Sales-to-Delivery Intake mapping reviewed.</label>' +
                '<label><input type="checkbox" data-026-check="syncReadinessReviewed"> Sync preview model reviewed.</label>' +
                '<label><input type="checkbox" data-026-check="promotionAuditReviewed"> Promotion audit event model reviewed.</label>' +
                '<label><input type="checkbox" data-026-check="closeoutReviewed"> Module 026 closeout reviewed.</label>' +
              '</div>' +
            '</div>' +
          '</div>' +

          '<div>' +
            '<div class="projectpulse-026-section white">' +
              '<h3>CRM to ProjectPulse Field Mapping</h3>' +
              mappingTableHtml() +
            '</div>' +

            '<div class="projectpulse-026-section">' +
              '<h3>Sync Preview</h3>' +
              '<div class="projectpulse-026-preview" data-026-sync-preview-output></div>' +
            '</div>' +

            '<div class="projectpulse-026-section">' +
              '<h3>Promotion Preview / Audit</h3>' +
              '<div class="projectpulse-026-preview" data-026-promotion-preview-output></div>' +
            '</div>' +

            '<div class="projectpulse-026-section">' +
              '<h3>Module 026 Readiness Summary</h3>' +
              '<div class="projectpulse-026-preview" data-026-readiness></div>' +
            '</div>' +

            '<div class="projectpulse-026-section">' +
              '<h3>Workflow Placement</h3>' +
              '<div class="projectpulse-026-three-grid">' +
                '<div class="projectpulse-026-cardlet"><span class="projectpulse-026-pill blue">025</span><strong>SOW Generator</strong><p>CRM fields prepopulate SOW research and draft generation.</p></div>' +
                '<div class="projectpulse-026-cardlet"><span class="projectpulse-026-pill green">024</span><strong>Intake Foundation</strong><p>CRM quote/opportunity data feeds intake artifacts and project readiness.</p></div>' +
                '<div class="projectpulse-026-cardlet"><span class="projectpulse-026-pill amber">027</span><strong>Signed Handoff</strong><p>Signed opportunity or signed SOW state triggers PTC/Executive notification.</p></div>' +
              '</div>' +
            '</div>' +
          '</div>' +
        '</div>' +
      '</div>';

    populateShell(shell);
    wireShell(shell);
  }

  function populateShell(shell) {
    [
      'primaryCrm',
      'syncMode',
      'salesforceStatus',
      'zendeskSellStatus',
      'selectedScenario',
      'sampleAccount',
      'sampleOpportunity',
      'sampleQuote',
      'crmOwner',
      'solutionArchitect',
      'estimatedHours',
      'estimatedRevenue',
      'sourceRecordReference',
      'serviceSummary'
    ].forEach(function (key) {
      setValue(shell, key, state[key]);
    });

    [
      'providerRegistryReviewed',
      'fieldMappingReviewed',
      'securityReviewed',
      'noSecretsReviewed',
      'intakeMappingReviewed',
      'sowMappingReviewed',
      'syncReadinessReviewed',
      'promotionAuditReviewed',
      'closeoutReviewed'
    ].forEach(function (key) {
      setCheck(shell, key, state[key]);
    });

    var syncPreviewNode = shell.querySelector('[data-026-sync-preview-output]');
    var promotionNode = shell.querySelector('[data-026-promotion-preview-output]');
    var readinessNode = shell.querySelector('[data-026-readiness]');
    var statusNode = shell.querySelector('[data-026-status]');

    if (syncPreviewNode) syncPreviewNode.textContent = state.lastPreview || syncPreview();
    if (promotionNode) promotionNode.textContent = state.lastPromotion || sowPromotionPreview();
    if (readinessNode) readinessNode.textContent = readinessSummary();

    if (statusNode) {
      statusNode.innerHTML = state.status
        ? '<div class="projectpulse-026-status ' + escapeHtml(state.statusType || '') + '">' + escapeHtml(state.status) + '</div>'
        : '';
    }
  }

  function wireShell(shell) {
    shell.querySelectorAll('input, select, textarea').forEach(function (input) {
      input.addEventListener('input', function () {
        captureInputs();
        populateShell(shell);
      });
      input.addEventListener('change', function () {
        captureInputs();
        populateShell(shell);
      });
    });

    shell.querySelector('[data-026-dashboard]').addEventListener('click', function () {
      window.location.hash = '#dashboard';
      render();
    });

    shell.querySelector('[data-026-clear]').addEventListener('click', function () {
      if (!confirm('Clear Module 026 demo state on this browser?')) return;
      window.localStorage.removeItem(storageKey);
      location.reload();
    });

    shell.querySelector('[data-026-validate]').addEventListener('click', validateFramework);
    shell.querySelector('[data-026-sync-preview]').addEventListener('click', recordSyncPreview);
    shell.querySelector('[data-026-promote-sow]').addEventListener('click', promoteToSow);
    shell.querySelector('[data-026-promote-intake]').addEventListener('click', promoteToIntake);
  }

  function render() {
    loadState();
    ensureShell();
    ensureCard();
    openShell(route() === 'crm-integration');
  }

  function boot(attempt) {
    render();
    if (!document.getElementById(cardId) && attempt !== 12) {
      setTimeout(function () { boot(attempt + 1); }, 250);
    }
  }

  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', function () { boot(0); });
  } else {
    boot(0);
  }

  window.addEventListener('hashchange', function () { setTimeout(render, 60); });
})();
</script>

<script id="projectpulse-024-script">
(function () {
  if (window.__projectPulse024Installed) return;
  window.__projectPulse024Installed = true;

  var cardId = 'projectpulse-024-intake-card';
  var shellId = 'projectpulse-024-shell';
  var storageKey = 'projectpulse024SalesDeliveryIntake';

  var state = {
    intakeReference: 'INTAKE-024-DEMO',
    sourceSystem: 'Manual / ProjectPulse',
    sourceRecordReference: 'CRM-OPP-026-DEMO',
    customerName: 'Great Lakes Healthcare',
    projectName: 'Cisco CUCM 11.5 to 15.0 Upgrade',
    projectType: 'Professional Services',
    salesOwner: 'Sales Owner',
    solutionArchitect: 'Solution Architect',
    projectTeamCoordinator: 'Project Team Coordinator',
    estimatedHours: '80',
    estimatedRevenue: '60000',
    highLevelScope: 'Upgrade Cisco CUCM 11.5 to 15.0. Validate migration path, dependencies, phone firmware, gateways, voicemail, E911, SIP trunks, certificates, backups, cutover, rollback, and post-upgrade calling validation.',
    signedSowFileName: '',
    gsdFileName: '',
    quoteFileName: '',
    customerConfirmed: false,
    scopeConfirmed: false,
    estimateConfirmed: false,
    salesOwnerConfirmed: false,
    solutionArchitectConfirmed: false,
    signedSowConfirmed: false,
    gsdConfirmed: false,
    canonicalDocsConfirmed: false,
    ptcAssignmentReady: false,
    executiveVisibilityReady: false,
    closeoutReviewed: false,
    lastReadiness: '',
    lastAssignmentPreview: '',
    status: '',
    statusType: ''
  };

  function escapeHtml(value) {
    return String(value == null ? '' : value)
      .replaceAll('&', '&amp;')
      .replaceAll('<', '&lt;')
      .replaceAll('>', '&gt;')
      .replaceAll('"', '&quot;')
      .replaceAll("'", '&#039;');
  }

  function cleanText(value) {
    return String(value || '').replace(/\s+/g, ' ').trim();
  }

  function loadState() {
    try {
      var raw = window.localStorage.getItem(storageKey);
      if (!raw) return;
      Object.assign(state, JSON.parse(raw));
    } catch {}
  }

  function saveState() {
    try {
      window.localStorage.setItem(storageKey, JSON.stringify(state));
    } catch {}
  }

  function route() {
    return String(window.location.hash || '#dashboard').replace(/^#/, '').split('?')[0].toLowerCase();
  }

  function getDashboardGrid() {
    var intakeCard = document.getElementById(cardId);
    if (intakeCard && intakeCard.parentElement) return intakeCard.parentElement;

    var crmCard = document.getElementById('projectpulse-026-crm-card');
    if (crmCard && crmCard.parentElement) return crmCard.parentElement;

    var sowCard = document.getElementById('projectpulse-025-sow-card');
    if (sowCard && sowCard.parentElement) return sowCard.parentElement;

    var notificationCard = document.getElementById('projectpulse-022e-dashboard-notification-card');
    if (notificationCard && notificationCard.parentElement) return notificationCard.parentElement;

    var candidates = Array.from(document.querySelectorAll('section, article, div, main'))
      .filter(function (element) {
        if (element.id === cardId || element.closest('#' + cardId)) return false;
        var text = cleanText(element.textContent);
        var rect = element.getBoundingClientRect();
        return rect.width > 700 &&
          rect.height > 250 &&
          text.includes('Project Workload') &&
          text.includes('Project Workspace') &&
          text.includes('Project Intake');
      })
      .sort(function (a, b) {
        var ar = a.getBoundingClientRect();
        var br = b.getBoundingClientRect();
        return (ar.width * ar.height) - (br.width * br.height);
      });

    return candidates[0] || null;
  }

  function ensureCard() {
    var grid = getDashboardGrid();
    if (!grid) return null;

    var card = document.getElementById(cardId);
    if (!card) {
      card = document.createElement('section');
      card.id = cardId;
      card.innerHTML =
        '<div class="projectpulse-024-eyebrow">Module 024</div>' +
        '<h3>Sales-to-Delivery Intake Foundation</h3>' +
        '<p>Create the intake package that gates delivery handoff on required signed SOW and GSD artifacts before PTC assignment of PM and Engineers.</p>' +
        '<div class="projectpulse-024-actions">' +
          '<button type="button" class="projectpulse-024-button primary" data-024-open>Open Sales Intake</button>' +
          '<span class="projectpulse-024-pill green">Signed SOW required</span>' +
          '<span class="projectpulse-024-pill blue">GSD required</span>' +
          '<span class="projectpulse-024-pill amber">Assignment gated</span>' +
        '</div>';

      var crmCard = document.getElementById('projectpulse-026-crm-card');
      var sowCard = document.getElementById('projectpulse-025-sow-card');

      if (crmCard && crmCard.parentElement === grid) {
        grid.insertBefore(card, crmCard);
      } else if (sowCard && sowCard.parentElement === grid) {
        grid.insertBefore(card, sowCard);
      } else {
        grid.insertBefore(card, grid.firstElementChild || null);
      }

      card.querySelector('[data-024-open]').addEventListener('click', function () {
        window.location.hash = '#sales-intake';
        render();
      });
    }

    return card;
  }

  function ensureShell() {
    var shell = document.getElementById(shellId);
    if (!shell) {
      shell = document.createElement('div');
      shell.id = shellId;
      shell.setAttribute('aria-label', 'Sales-to-Delivery Intake route');
      document.body.appendChild(shell);
    }
    return shell;
  }

  function openShell(open) {
    var shell = ensureShell();
    if (open) {
      shell.setAttribute('data-open', 'true');
      document.documentElement.style.overflow = 'hidden';
      document.body.style.overflow = 'hidden';
      renderShell();
      setTimeout(function () { shell.scrollTop = 0; }, 0);
    } else {
      shell.removeAttribute('data-open');
      document.documentElement.style.overflow = '';
      document.body.style.overflow = '';
    }
  }

  function setValue(root, name, value) {
    var element = root.querySelector('[data-024-field="' + name + '"]');
    if (element) element.value = value || '';
  }

  function setCheck(root, name, value) {
    var element = root.querySelector('[data-024-check="' + name + '"]');
    if (element) element.checked = !!value;
  }

  function captureInputs() {
    var shell = document.getElementById(shellId);
    if (!shell || shell.getAttribute('data-open') !== 'true') return;

    function get(name) {
      var element = shell.querySelector('[data-024-field="' + name + '"]');
      return element ? element.value : '';
    }

    function checked(name) {
      var element = shell.querySelector('[data-024-check="' + name + '"]');
      return !!(element && element.checked);
    }

    [
      'intakeReference',
      'sourceSystem',
      'sourceRecordReference',
      'customerName',
      'projectName',
      'projectType',
      'salesOwner',
      'solutionArchitect',
      'projectTeamCoordinator',
      'estimatedHours',
      'estimatedRevenue',
      'highLevelScope'
    ].forEach(function (key) {
      state[key] = get(key);
    });

    [
      'customerConfirmed',
      'scopeConfirmed',
      'estimateConfirmed',
      'salesOwnerConfirmed',
      'solutionArchitectConfirmed',
      'signedSowConfirmed',
      'gsdConfirmed',
      'canonicalDocsConfirmed',
      'ptcAssignmentReady',
      'executiveVisibilityReady',
      'closeoutReviewed'
    ].forEach(function (key) {
      state[key] = checked(key);
    });

    saveState();
  }

  function artifactRowsHtml() {
    var rows = [
      ['Signed SOW', state.signedSowFileName || 'Missing', 'Required before PTC assignment', state.signedSowFileName ? 'Received' : 'Required'],
      ['GSD', state.gsdFileName || 'Missing', 'Required before PM/Engineer handoff', state.gsdFileName ? 'Received' : 'Required'],
      ['Quote / CRM Support', state.quoteFileName || state.sourceRecordReference || 'Optional', 'Supports estimate and scope review', state.quoteFileName || state.sourceRecordReference ? 'Available' : 'Optional']
    ];

    return '<table class="projectpulse-024-table">' +
      '<thead><tr><th>Artifact</th><th>Current Value</th><th>Use</th><th>Status</th></tr></thead>' +
      '<tbody>' +
      rows.map(function (row) {
        return '<tr><td>' + escapeHtml(row[0]) + '</td><td>' + escapeHtml(row[1]) + '</td><td>' + escapeHtml(row[2]) + '</td><td>' + escapeHtml(row[3]) + '</td></tr>';
      }).join('') +
      '</tbody></table>';
  }

  function roleVisibilityHtml() {
    var rows = [
      ['Sales', 'Create/update intake, attach signed SOW/GSD package artifacts', 'Before handoff'],
      ['Solution Architect', 'Review scope, signed SOW, GSD, and technical readiness', 'Before handoff'],
      ['PTC', 'Validate readiness and prepare PM/Engineer assignment', 'Before assignment'],
      ['Executive', 'View signed handoff readiness and delivery pipeline status', 'Before assignment'],
      ['Project Management', 'View SOW/GSD after assignment', 'After assignment'],
      ['Engineer', 'View assigned SOW/GSD after assignment', 'After assignment']
    ];

    return '<table class="projectpulse-024-table">' +
      '<thead><tr><th>Role</th><th>Visibility / Responsibility</th><th>Timing</th></tr></thead>' +
      '<tbody>' +
      rows.map(function (row) {
        return '<tr><td>' + escapeHtml(row[0]) + '</td><td>' + escapeHtml(row[1]) + '</td><td>' + escapeHtml(row[2]) + '</td></tr>';
      }).join('') +
      '</tbody></table>';
  }

  function readinessSummary() {
    var requiredChecks = [
      state.customerConfirmed,
      state.scopeConfirmed,
      state.estimateConfirmed,
      state.salesOwnerConfirmed,
      state.solutionArchitectConfirmed,
      state.signedSowConfirmed,
      state.gsdConfirmed,
      state.canonicalDocsConfirmed,
      state.ptcAssignmentReady,
      state.executiveVisibilityReady,
      state.closeoutReviewed
    ];

    var complete = requiredChecks.filter(Boolean).length;
    var artifactStatus = state.signedSowFileName && state.gsdFileName ? 'Required artifacts selected' : 'Missing required signed SOW or GSD';

    return 'Sales-to-Delivery Intake Readiness Summary\n\n' +
      'Intake Reference: ' + state.intakeReference + '\n' +
      'Source System: ' + state.sourceSystem + '\n' +
      'Source Record Reference: ' + state.sourceRecordReference + '\n' +
      'Customer: ' + state.customerName + '\n' +
      'Project: ' + state.projectName + '\n' +
      'Project Type: ' + state.projectType + '\n' +
      'Sales Owner: ' + state.salesOwner + '\n' +
      'Solution Architect: ' + state.solutionArchitect + '\n' +
      'PTC: ' + state.projectTeamCoordinator + '\n' +
      'Estimated Hours: ' + state.estimatedHours + '\n' +
      'Estimated Revenue: $' + state.estimatedRevenue + '\n\n' +
      'Artifact Gate:\n' +
      '- Signed SOW: ' + (state.signedSowFileName || 'Missing') + '\n' +
      '- GSD: ' + (state.gsdFileName || 'Missing') + '\n' +
      '- Gate Status: ' + artifactStatus + '\n\n' +
      'Readiness Checks Complete: ' + complete + ' / ' + requiredChecks.length + '\n\n' +
      'Assignment Gate Rule:\n' +
      'PTC assignment of PM and Engineer(s) should not proceed until signed SOW and GSD are received, scope/estimate are confirmed, and the canonical document area is acknowledged.';
  }

  function handoffEmailPreview() {
    return 'Subject: Signed SOW/GSD Intake Ready - ' + state.customerName + ' / ' + state.projectName + '\n\n' +
      'Hello PTC and Executive Team,\n\n' +
      'The Sales-to-Delivery intake package has been prepared for ' + state.customerName + ' - ' + state.projectName + '.\n\n' +

  function populateShell(shell) {
    [
      'intakeReference',
      'sourceSystem',
      'sourceRecordReference',
      'customerName',
      'projectName',
      'projectType',
      'salesOwner',
      'solutionArchitect',
      'projectTeamCoordinator',
      'estimatedHours',
      'estimatedRevenue',
      'highLevelScope'
    ].forEach(function (key) {
      setValue(shell, key, state[key]);
    });

    [
      'customerConfirmed',
      'scopeConfirmed',
      'estimateConfirmed',
      'salesOwnerConfirmed',
      'solutionArchitectConfirmed',
      'signedSowConfirmed',
      'gsdConfirmed',
      'canonicalDocsConfirmed',
      'ptcAssignmentReady',
      'executiveVisibilityReady',
      'closeoutReviewed'
    ].forEach(function (key) {
      setCheck(shell, key, state[key]);
    });

    shell.querySelector('[data-024-sow-name]').textContent = state.signedSowFileName || 'Required before assignment';
    shell.querySelector('[data-024-gsd-name]').textContent = state.gsdFileName || 'Required before assignment';
    shell.querySelector('[data-024-quote-name]').textContent = state.quoteFileName || 'Optional supporting artifact';

    var readinessNode = shell.querySelector('[data-024-readiness-output]');
    var emailNode = shell.querySelector('[data-024-email-output]');
    var assignmentNode = shell.querySelector('[data-024-assignment-output]');
    var statusNode = shell.querySelector('[data-024-status]');

    if (readinessNode) readinessNode.textContent = state.lastReadiness || readinessSummary();
    if (emailNode) emailNode.textContent = handoffEmailPreview();
    if (assignmentNode) assignmentNode.textContent = state.lastAssignmentPreview || assignmentPreview();

    if (statusNode) {
      statusNode.innerHTML = state.status
        ? '<div class="projectpulse-024-status ' + escapeHtml(state.statusType || '') + '">' + escapeHtml(state.status) + '</div>'
        : '';
    }
  }

  function wireShell(shell) {
    shell.querySelectorAll('input, select, textarea').forEach(function (input) {
      input.addEventListener('input', function () {
        captureInputs();
        populateShell(shell);
      });
      input.addEventListener('change', function () {
        captureInputs();
        populateShell(shell);
      });
    });

    shell.querySelector('[data-024-signed-sow-file]').addEventListener('change', function (event) {
      state.signedSowFileName = event.target.files && event.target.files[0] ? event.target.files[0].name : '';
      if (state.signedSowFileName) state.signedSowConfirmed = true;
      saveState();
      renderShell();
    });

    shell.querySelector('[data-024-gsd-file]').addEventListener('change', function (event) {
      state.gsdFileName = event.target.files && event.target.files[0] ? event.target.files[0].name : '';
      if (state.gsdFileName) state.gsdConfirmed = true;
      saveState();
      renderShell();
    });

    shell.querySelector('[data-024-quote-file]').addEventListener('change', function (event) {
      state.quoteFileName = event.target.files && event.target.files[0] ? event.target.files[0].name : '';
      saveState();
      renderShell();
    });

    shell.querySelector('[data-024-dashboard]').addEventListener('click', function () {
      window.location.hash = '#dashboard';
      render();
    });

    shell.querySelector('[data-024-clear]').addEventListener('click', function () {
      if (!confirm('Clear Module 024 demo state on this browser?')) return;
      window.localStorage.removeItem(storageKey);
      location.reload();
    });

    shell.querySelector('[data-024-save]').addEventListener('click', saveIntakePackage);
    shell.querySelector('[data-024-readiness]').addEventListener('click', validateReadiness);
    shell.querySelector('[data-024-assignment]').addEventListener('click', prepareAssignmentPreview);
  }

  function render() {
    loadState();
    ensureShell();
    ensureCard();
    openShell(route() === 'sales-intake' || route() === 'sales-to-delivery-intake');
  }

  function boot(attempt) {
    render();
    if (!document.getElementById(cardId) && attempt !== 12) {
      setTimeout(function () { boot(attempt + 1); }, 250);
    }
  }

  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', function () { boot(0); });
  } else {
    boot(0);
  }

  window.addEventListener('hashchange', function () { setTimeout(render, 60); });
})();

    status: '',
    statusType: ''
  };

  function escapeHtml(value) {
    return String(value == null ? '' : value)
      .replaceAll('&', '&amp;')
      .replaceAll('<', '&lt;')
      .replaceAll('>', '&gt;')
      .replaceAll('"', '&quot;')
      .replaceAll("'", '&#039;');
  }

  function cleanText(value) {
    return String(value || '').replace(/\s+/g, ' ').trim();
  }

  function loadState() {
    try {
      var raw = window.localStorage.getItem(storageKey);
      if (!raw) return;
      Object.assign(state, JSON.parse(raw));
    } catch {}
  }

  function saveState() {
    try {
      window.localStorage.setItem(storageKey, JSON.stringify(state));
    } catch {}
  }

  function route() {
    return String(window.location.hash || '#dashboard').replace(/^#/, '').split('?')[0].toLowerCase();
  }

  function getDashboardGrid() {
    var handoffCard = document.getElementById(cardId);
    if (handoffCard && handoffCard.parentElement) return handoffCard.parentElement;

    var intakeCard = document.getElementById('projectpulse-024-intake-card');
    if (intakeCard && intakeCard.parentElement) return intakeCard.parentElement;

    var crmCard = document.getElementById('projectpulse-026-crm-card');
    if (crmCard && crmCard.parentElement) return crmCard.parentElement;

    var sowCard = document.getElementById('projectpulse-025-sow-card');
    if (sowCard && sowCard.parentElement) return sowCard.parentElement;

    var notificationCard = document.getElementById('projectpulse-022e-dashboard-notification-card');
    if (notificationCard && notificationCard.parentElement) return notificationCard.parentElement;

    var candidates = Array.from(document.querySelectorAll('section, article, div, main'))
      .filter(function (element) {
        if (element.id === cardId || element.closest('#' + cardId)) return false;
        var text = cleanText(element.textContent);
        var rect = element.getBoundingClientRect();
        return rect.width > 700 &&
          rect.height > 250 &&
          text.includes('Project Workload') &&
          text.includes('Project Workspace') &&
          text.includes('Project Intake');
      })
      .sort(function (a, b) {
        var ar = a.getBoundingClientRect();
        var br = b.getBoundingClientRect();
        return (ar.width * ar.height) - (br.width * br.height);
      });

    return candidates[0] || null;
  }

  function ensureCard() {
    var grid = getDashboardGrid();
    if (!grid) return null;

    var card = document.getElementById(cardId);
    if (!card) {
      card = document.createElement('section');
      card.id = cardId;
      card.innerHTML =
        '<div class="projectpulse-027-eyebrow">Module 027</div>' +
        '<h3>Signed SOW Handoff + Assignment Trigger</h3>' +
        '<p>Validate signed SOW/GSD readiness, notify PTC and Executive stakeholders, and prepare PM/Engineer assignment package.</p>' +
        '<div class="projectpulse-027-actions">' +
          '<button type="button" class="projectpulse-027-button primary" data-027-open>Open Signed Handoff</button>' +
          '<span class="projectpulse-027-pill green">PTC / Executive notify</span>' +
          '<span class="projectpulse-027-pill blue">Assignment trigger</span>' +
          '<span class="projectpulse-027-pill amber">Email safety gated</span>' +
        '</div>';

      var intakeCard = document.getElementById('projectpulse-024-intake-card');
      var crmCard = document.getElementById('projectpulse-026-crm-card');

      if (crmCard && crmCard.parentElement === grid) {
        grid.insertBefore(card, crmCard.nextSibling);
      } else if (intakeCard && intakeCard.parentElement === grid) {
        grid.insertBefore(card, intakeCard.nextSibling);
      } else {
        grid.insertBefore(card, grid.firstElementChild || null);
      }

      card.querySelector('[data-027-open]').addEventListener('click', function () {
        window.location.hash = '#signed-handoff';
        render();
      });
    }

    return card;
  }

  function ensureShell() {
    var shell = document.getElementById(shellId);
    if (!shell) {
      shell = document.createElement('div');
      shell.id = shellId;
      shell.setAttribute('aria-label', 'Signed SOW Handoff route');
      document.body.appendChild(shell);
    }
    return shell;
  }

  function openShell(open) {
    var shell = ensureShell();
    if (open) {
      shell.setAttribute('data-open', 'true');
      document.documentElement.style.overflow = 'hidden';
      document.body.style.overflow = 'hidden';
      renderShell();
      setTimeout(function () { shell.scrollTop = 0; }, 0);
    } else {
      shell.removeAttribute('data-open');
      document.documentElement.style.overflow = '';
      document.body.style.overflow = '';
    }
  }

  function setValue(root, name, value) {
    var element = root.querySelector('[data-027-field="' + name + '"]');
    if (element) element.value = value || '';
  }

  function setCheck(root, name, value) {
    var element = root.querySelector('[data-027-check="' + name + '"]');
    if (element) element.checked = !!value;
  }

  function captureInputs() {
    var shell = document.getElementById(shellId);
    if (!shell || shell.getAttribute('data-open') !== 'true') return;

    function get(name) {
      var element = shell.querySelector('[data-027-field="' + name + '"]');
      return element ? element.value : '';
    }

    function checked(name) {
      var element = shell.querySelector('[data-027-check="' + name + '"]');
      return !!(element && element.checked);
    }

    [
      'handoffReference',
      'intakeReference',
      'crmSource',
      'crmRecordReference',
      'customerName',
      'projectName',
      'projectType',
      'salesOwner',
      'solutionArchitect',
      'projectTeamCoordinator',
      'estimatedHours',
      'estimatedRevenue',
      'scopeSummary',
      'assignedProjectManager',
      'assignedEngineeringTeam',
      'primaryEngineer',
      'secondaryEngineer',
      'backupEngineer',
      'targetStartDate',
      'assignmentNotes'
    ].forEach(function (key) {
      state[key] = get(key);
    });

    [
      'signedSowConfirmed',
      'gsdConfirmed',
      'scopeLocked',
      'canonicalDocsConfirmed',
      'ptcNotificationReady',
      'executiveNotificationReady',
      'assignmentPackageReady',
      'pmAssignmentConfirmed',
      'engineerAssignmentConfirmed',
      'sharedEmailProviderConfirmed',
      'recipientSafetyConfirmed',
      'auditReviewed',
      'closeoutReviewed'
    ].forEach(function (key) {
      state[key] = checked(key);
    });

    saveState();
  }

  function validateReadiness() {
    captureInputs();

    var missing = [];
    if (!state.signedSowFileName) missing.push('signed SOW file');
    if (!state.gsdFileName) missing.push('GSD file');
    if (!state.signedSowConfirmed) missing.push('signed SOW confirmation');
    if (!state.gsdConfirmed) missing.push('GSD confirmation');
    if (!state.scopeLocked) missing.push('scope locked');
    if (!state.canonicalDocsConfirmed) missing.push('canonical document confirmation');
    if (!state.ptcNotificationReady) missing.push('PTC notification readiness');
    if (!state.executiveNotificationReady) missing.push('Executive notification readiness');
    if (!state.assignmentPackageReady) missing.push('assignment package readiness');
    if (!state.sharedEmailProviderConfirmed) missing.push('shared email provider confirmation');
    if (!state.recipientSafetyConfirmed) missing.push('recipient safety confirmation');
    if (!state.auditReviewed) missing.push('audit review');
    if (!state.closeoutReviewed) missing.push('Module 027 closeout review');

    if (missing.length) {
      state.statusType = 'warning';
      state.status = 'Handoff is not ready to trigger. Missing: ' + missing.join(', ') + '.';
    } else {
      state.statusType = 'success';
      state.status = 'Signed SOW handoff is ready for PTC/Executive notification and assignment trigger.';
    }

    state.lastAuditEvent = auditPreview('handoff_readiness_validated');
    saveState();
    renderShell();

                '<label><input type="checkbox" data-027-check="scopeLocked"> Scope is locked and approved for delivery.</label>' +
                '<label><input type="checkbox" data-027-check="canonicalDocsConfirmed"> Canonical SOW/GSD document area confirmed.</label>' +
                '<label><input type="checkbox" data-027-check="ptcNotificationReady"> PTC notification readiness confirmed.</label>' +
                '<label><input type="checkbox" data-027-check="executiveNotificationReady"> Executive notification readiness confirmed.</label>' +
                '<label><input type="checkbox" data-027-check="assignmentPackageReady"> Assignment package readiness confirmed.</label>' +
                '<label><input type="checkbox" data-027-check="pmAssignmentConfirmed"> PM assignment confirmed.</label>' +
                '<label><input type="checkbox" data-027-check="engineerAssignmentConfirmed"> Engineer assignment confirmed.</label>' +
                '<label><input type="checkbox" data-027-check="sharedEmailProviderConfirmed"> Shared email provider readiness confirmed.</label>' +
                '<label><input type="checkbox" data-027-check="recipientSafetyConfirmed"> Recipient safety gate confirmed.</label>' +
                '<label><input type="checkbox" data-027-check="auditReviewed"> Audit trail reviewed.</label>' +
                '<label><input type="checkbox" data-027-check="closeoutReviewed"> Module 027 closeout reviewed.</label>' +
              '</div>' +
            '</div>' +
          '</div>' +

          '<div>' +
            '<div class="projectpulse-027-section white"><h3>Signed Handoff Readiness Summary</h3><div class="projectpulse-027-preview" data-027-readiness-output></div></div>' +
            '<div class="projectpulse-027-section"><h3>PTC / Executive Notification Preview</h3><div class="projectpulse-027-preview" data-027-ptc-email-output></div></div>' +
            '<div class="projectpulse-027-section"><h3>PM / Engineer Assignment Notification Preview</h3><div class="projectpulse-027-preview" data-027-assignment-email-output></div></div>' +
            '<div class="projectpulse-027-section"><h3>Assignment Trigger Preview</h3><div class="projectpulse-027-preview" data-027-assignment-output></div></div>' +
            '<div class="projectpulse-027-section"><h3>Audit Trail Preview</h3><div class="projectpulse-027-preview" data-027-audit-output></div></div>' +
            '<div class="projectpulse-027-section"><h3>Role Visibility Model</h3>' + roleVisibilityHtml() + '</div>' +
            '<div class="projectpulse-027-section">' +
              '<h3>Workflow Placement</h3>' +
              '<div class="projectpulse-027-three-grid">' +
                '<div class="projectpulse-027-cardlet"><span class="projectpulse-027-pill blue">024</span><strong>Intake</strong><p>Validated signed SOW/GSD readiness flows into handoff.</p></div>' +
                '<div class="projectpulse-027-cardlet"><span class="projectpulse-027-pill green">025</span><strong>SOW Generator</strong><p>SA-reviewed SOW context supports signed package.</p></div>' +
                '<div class="projectpulse-027-cardlet"><span class="projectpulse-027-pill amber">028</span><strong>SOW-Aware Time Entry</strong><p>Assignment unlocks SOW/GSD-aware time-entry checks.</p></div>' +
              '</div>' +
            '</div>' +
          '</div>' +
        '</div>' +
      '</div>';

    populateShell(shell);
    wireShell(shell);
  }

  function populateShell(shell) {
    [
      'handoffReference',
      'intakeReference',
      'crmSource',
      'crmRecordReference',
      'customerName',
      'projectName',
      'projectType',
      'salesOwner',
      'solutionArchitect',
      'projectTeamCoordinator',
      'estimatedHours',
      'estimatedRevenue',
      'scopeSummary',
      'assignedProjectManager',
      'assignedEngineeringTeam',
      'primaryEngineer',
      'secondaryEngineer',
      'backupEngineer',
      'targetStartDate',
      'assignmentNotes'
    ].forEach(function (key) {
      setValue(shell, key, state[key]);
    });

    [
      'signedSowConfirmed',
      'gsdConfirmed',
      'scopeLocked',
      'canonicalDocsConfirmed',
      'ptcNotificationReady',
      'executiveNotificationReady',
      'assignmentPackageReady',
      'pmAssignmentConfirmed',
      'engineerAssignmentConfirmed',
      'sharedEmailProviderConfirmed',
      'recipientSafetyConfirmed',
      'auditReviewed',
      'closeoutReviewed'
    ].forEach(function (key) {
      setCheck(shell, key, state[key]);
    });

    shell.querySelector('[data-027-sow-name]').textContent = state.signedSowFileName || 'Required before handoff';
    shell.querySelector('[data-027-gsd-name]').textContent = state.gsdFileName || 'Required before assignment';
    shell.querySelector('[data-027-support-name]').textContent = state.supportingArtifactFileName || 'Optional supporting artifact';

    var readinessNode = shell.querySelector('[data-027-readiness-output]');
    var ptcEmailNode = shell.querySelector('[data-027-ptc-email-output]');
    var assignmentEmailNode = shell.querySelector('[data-027-assignment-email-output]');
    var assignmentNode = shell.querySelector('[data-027-assignment-output]');
    var auditNode = shell.querySelector('[data-027-audit-output]');
    var statusNode = shell.querySelector('[data-027-status]');

    if (readinessNode) readinessNode.textContent = readinessSummary();
    if (ptcEmailNode) ptcEmailNode.textContent = state.lastPtcExecutiveNotification || ptcExecutiveNotificationPreview();
    if (assignmentEmailNode) assignmentEmailNode.textContent = state.lastAssignmentNotification || assignmentNotificationPreview();
    if (assignmentNode) assignmentNode.textContent = state.lastAssignmentPreview || assignmentPreview();
    if (auditNode) auditNode.textContent = state.lastAuditEvent || auditPreview('module_027_loaded');

    if (statusNode) {
      statusNode.innerHTML = state.status
        ? '<div class="projectpulse-027-status ' + escapeHtml(state.statusType || '') + '">' + escapeHtml(state.status) + '</div>'
        : '';
    }
  }

  function wireShell(shell) {
    shell.querySelectorAll('input, select, textarea').forEach(function (input) {
      input.addEventListener('input', function () {
        captureInputs();
        populateShell(shell);
      });
      input.addEventListener('change', function () {
        captureInputs();
        populateShell(shell);
      });
    });

    shell.querySelector('[data-027-signed-sow-file]').addEventListener('change', function (event) {
      state.signedSowFileName = event.target.files && event.target.files[0] ? event.target.files[0].name : '';
      if (state.signedSowFileName) state.signedSowConfirmed = true;
      saveState();
      renderShell();
    });

    shell.querySelector('[data-027-gsd-file]').addEventListener('change', function (event) {
      state.gsdFileName = event.target.files && event.target.files[0] ? event.target.files[0].name : '';
      if (state.gsdFileName) state.gsdConfirmed = true;
      saveState();
      renderShell();
    });

    shell.querySelector('[data-027-support-file]').addEventListener('change', function (event) {
      state.supportingArtifactFileName = event.target.files && event.target.files[0] ? event.target.files[0].name : '';
      saveState();
      renderShell();
    });

    shell.querySelector('[data-027-dashboard]').addEventListener('click', function () {
      window.location.hash = '#dashboard';
      render();
    });

    shell.querySelector('[data-027-clear]').addEventListener('click', function () {
      if (!confirm('Clear Module 027 demo state on this browser?')) return;
      window.localStorage.removeItem(storageKey);
      location.reload();
    });

    shell.querySelector('[data-027-save]').addEventListener('click', saveHandoffPackage);
    shell.querySelector('[data-027-validate]').addEventListener('click', validateReadiness);
    shell.querySelector('[data-027-ptc-email]').addEventListener('click', preparePtcExecutiveNotification);
    shell.querySelector('[data-027-assignment-preview]').addEventListener('click', prepareAssignmentTrigger);
    shell.querySelector('[data-027-assignment-triggered]').addEventListener('click', markAssignmentTriggered);
  }

  function render() {
    loadState();
    ensureShell();
    ensureCard();
    var currentRoute = route();
    openShell(currentRoute === 'signed-handoff' || currentRoute === 'signed-sow-handoff' || currentRoute === 'assignment-trigger');
  }

  function boot(attempt) {
    render();
    if (!document.getElementById(cardId) && attempt !== 12) {
      setTimeout(function () { boot(attempt + 1); }, 250);
    }
  }

  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', function () { boot(0); });
  } else {
    boot(0);
  }

  window.addEventListener('hashchange', function () { setTimeout(render, 60); });
})();
</script>
