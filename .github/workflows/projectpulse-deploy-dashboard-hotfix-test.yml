name: ProjectPulse Deploy Dashboard Hotfix Test

on:
  workflow_dispatch:
    inputs:
      release_commit:
        description: Exact verified dashboard hotfix commit
        required: true
        default: 2344e0ed5c6b2bab4208a34d0f7e2c2a82ced4d9
        type: string
      confirmation:
        description: Enter DEPLOY-DASHBOARD-HOTFIX-TO-TEST
        required: true
        type: string

permissions:
  id-token: write
  contents: read

concurrency:
  group: projectpulse-deploy-dashboard-hotfix-test
  cancel-in-progress: false

jobs:
  deploy-web:
    name: Guarded dashboard web-only test deployment
    environment: test
    runs-on: ubuntu-latest
    env:
      EXPECTED_RELEASE_COMMIT: 2344e0ed5c6b2bab4208a34d0f7e2c2a82ced4d9
    steps:
      - name: Check out deployment controls
        uses: actions/checkout@v5
        with:
          path: control
          fetch-depth: 0

      - name: Check out exact hotfix source
        uses: actions/checkout@v5
        with:
          ref: ${{ inputs.release_commit }}
          path: release
          fetch-depth: 1

      - name: Guard workflow source and hotfix commit
        id: release
        shell: bash
        run: |
          set -Eeuo pipefail
          [[ '${{ github.ref }}' == 'refs/heads/main' ]] || {
            echo 'This workflow must be dispatched from main.' >&2
            exit 1
          }
          [[ '${{ inputs.confirmation }}' == 'DEPLOY-DASHBOARD-HOTFIX-TO-TEST' ]] || {
            echo 'The deployment confirmation text does not match.' >&2
            exit 1
          }
          [[ '${{ inputs.release_commit }}' =~ ^[0-9a-f]{40}$ ]] || {
            echo 'release_commit must be a complete 40-character SHA.' >&2
            exit 1
          }

          CONTROL_COMMIT="$(git -C control rev-parse HEAD)"
          TARGET_COMMIT="$(git -C release rev-parse HEAD)"
          [[ "$CONTROL_COMMIT" == '${{ github.sha }}' ]] || {
            echo 'The checked-out control commit does not match this workflow run.' >&2
            exit 1
          }
          [[ "$TARGET_COMMIT" == '${{ inputs.release_commit }}' ]] || {
            echo 'The checked-out release does not match the requested commit.' >&2
            exit 1
          }
          [[ "$TARGET_COMMIT" == "$EXPECTED_RELEASE_COMMIT" ]] || {
            echo 'Only the verified dashboard hotfix commit may be deployed.' >&2
            exit 1
          }
          git -C control merge-base --is-ancestor "$TARGET_COMMIT" HEAD || {
            echo 'The hotfix release is not an ancestor of the deployment-control commit.' >&2
            exit 1
          }
          grep -Fq '#role-welcome-dashboard' release/src/frontend/project-time-web/src/role-welcome-dashboard-visibility.css
          grep -Fq 'display: grid !important' release/src/frontend/project-time-web/src/role-welcome-dashboard-visibility.css
          grep -Fq "./role-welcome-dashboard-visibility.css" release/src/frontend/project-time-web/src/main.jsx
          echo "target_commit=$TARGET_COMMIT" >> "$GITHUB_OUTPUT"

      - uses: azure/login@v2
        with:
          client-id: ${{ vars.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}

      - name: Capture current web image
        id: before
        shell: bash
        run: |
          set -Eeuo pipefail
          RAW_OLD_WEB_IMAGE="$(az containerapp show -g '${{ vars.AZURE_RESOURCE_GROUP }}' -n '${{ vars.AZURE_WEB_APP }}' --query 'properties.template.containers[0].image' -o tsv)"
          WEB_REVISION_MODE="$(az containerapp show -g '${{ vars.AZURE_RESOURCE_GROUP }}' -n '${{ vars.AZURE_WEB_APP }}' --query 'properties.configuration.activeRevisionsMode' -o tsv)"
          [[ -n "$RAW_OLD_WEB_IMAGE" ]] || {
            echo 'Could not capture the active web image.' >&2
            exit 1
          }
          [[ "${WEB_REVISION_MODE,,}" == 'single' ]] || {
            echo 'The web Container App must use single-revision mode.' >&2
            exit 1
          }

          resolve_acr_image_digest() {
            local image="$1"
            local registry='${{ vars.AZURE_ACR_NAME }}.azurecr.io/'
            local relative repository digest
            case "$image" in
              "$registry"*@sha256:*) printf '%s\n' "$image"; return 0 ;;
              "$registry"*:*) ;;
              *) echo "Rollback image is outside the approved ACR: $image" >&2; return 1 ;;
            esac
            relative="${image#"$registry"}"
            repository="${relative%:*}"
            digest="$(az acr repository show --name '${{ vars.AZURE_ACR_NAME }}' --image "$relative" --query digest -o tsv)"
            [[ "$digest" == sha256:* ]] || {
              echo "Could not resolve rollback digest for $image." >&2
              return 1
            }
            printf '%s%s@%s\n' "$registry" "$repository" "$digest"
          }

          OLD_WEB_IMAGE="$(resolve_acr_image_digest "$RAW_OLD_WEB_IMAGE")"
          echo "old_web_image=$OLD_WEB_IMAGE" >> "$GITHUB_OUTPUT"
          echo "CURRENT_WEB_IMAGE_IMMUTABLE=$OLD_WEB_IMAGE"

      - name: Build exact dashboard hotfix web image
        id: build
        shell: bash
        working-directory: release
        run: |
          set -Eeuo pipefail
          TARGET_COMMIT='${{ steps.release.outputs.target_commit }}'
          WEB_REPOSITORY='project-health-dashboard-web'
          RELEASE_TAG="dashboard-hotfix-$TARGET_COMMIT"
          WEB_DIGEST="$(
            ../control/scripts/build-pr55-acr-image.sh \
              '${{ vars.AZURE_ACR_NAME }}' \
              "$WEB_REPOSITORY:$RELEASE_TAG" \
              deployment/containers/web/Dockerfile \
              .
          )"
          WEB_IMAGE='${{ vars.AZURE_ACR_NAME }}.azurecr.io/'"$WEB_REPOSITORY@$WEB_DIGEST"
          echo "web_image=$WEB_IMAGE" >> "$GITHUB_OUTPUT"
          echo "IMMUTABLE_WEB_IMAGE=$WEB_IMAGE"

      - name: Deploy web hotfix only
        id: deploy_web
        shell: bash
        run: |
          set -Eeuo pipefail
          echo 'started=true' >> "$GITHUB_OUTPUT"
          az containerapp update \
            -g '${{ vars.AZURE_RESOURCE_GROUP }}' \
            -n '${{ vars.AZURE_WEB_APP }}' \
            --image '${{ steps.build.outputs.web_image }}' \
            --revision-suffix "dashfix-${GITHUB_RUN_ID}" \
            --output none

      - name: Validate served hotfix bundle and web image
        shell: bash
        run: |
          set -Eeuo pipefail
          BASE_URL='${{ vars.PUBLIC_URL }}'
          BASE_URL="${BASE_URL%/}"
          READY='false'
          LAST_STATUS='not-requested'
          LAST_ASSET='not-resolved'

          for attempt in $(seq 1 30); do
            CACHE_BUSTER="dashfix-${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}-${attempt}"
            STATUS="$(curl --silent --show-error --location --header 'Cache-Control: no-cache' --header 'Pragma: no-cache' --output /tmp/dashfix-index.html --write-out '%{http_code}' "$BASE_URL/?release_check=$CACHE_BUSTER" || true)"
            LAST_STATUS="$STATUS"
            LAST_ASSET='not-resolved'
            if [[ "$STATUS" == '200' ]]; then
              ASSET_PATH="$(sed -nE 's/.*src="([^"]+\.js)".*/\1/p' /tmp/dashfix-index.html | head -1)"
              if [[ -n "$ASSET_PATH" ]]; then
                case "$ASSET_PATH" in
                  http://*|https://*) ASSET_URL="$ASSET_PATH" ;;
                  /*) ASSET_URL="$BASE_URL$ASSET_PATH" ;;
                  *) ASSET_URL="$BASE_URL/$ASSET_PATH" ;;
                esac
                LAST_ASSET="$ASSET_PATH"
                ASSET_STATUS="$(curl --silent --show-error --location --header 'Cache-Control: no-cache' --header 'Pragma: no-cache' --output /tmp/dashfix-app.js --write-out '%{http_code}' "$ASSET_URL?release_check=$CACHE_BUSTER" || true)"
                LAST_STATUS="html=$STATUS,asset=$ASSET_STATUS"
                if [[ "$ASSET_STATUS" == '200' ]] \
                  && grep -Fq 'role-welcome-dashboard' /tmp/dashfix-app.js \
                  && grep -Fq 'Dashboard visibility contract' /tmp/dashfix-app.js; then
                  READY='true'
                  break
                fi
              fi
            fi
            (( attempt < 30 )) && sleep 10
          done

          [[ "$READY" == 'true' ]] || {
            echo "Dashboard hotfix bundle did not become ready: HTTP=$LAST_STATUS ASSET=$LAST_ASSET" >&2
            exit 1
          }

          ACTIVE_WEB_IMAGE="$(az containerapp show -g '${{ vars.AZURE_RESOURCE_GROUP }}' -n '${{ vars.AZURE_WEB_APP }}' --query 'properties.template.containers[0].image' -o tsv)"
          [[ "$ACTIVE_WEB_IMAGE" == '${{ steps.build.outputs.web_image }}' ]] || {
            echo "Active web image mismatch: expected=${{ steps.build.outputs.web_image }} actual=$ACTIVE_WEB_IMAGE" >&2
            exit 1
          }
          echo "DEPLOYED_DASHBOARD_HOTFIX_COMMIT=${{ steps.release.outputs.target_commit }}"
          echo "DEPLOYED_WEB_IMAGE=$ACTIVE_WEB_IMAGE"

      - name: Write dashboard hotfix deployment evidence
        if: success()
        shell: bash
        run: |
          set -Eeuo pipefail
          mkdir -p evidence
          cat > evidence/dashboard-hotfix-test-deployment.json <<JSON
          {
            "environment": "test",
            "releaseCommit": "${{ steps.release.outputs.target_commit }}",
            "workflowCommit": "${{ github.sha }}",
            "runId": "${{ github.run_id }}",
            "webImage": "${{ steps.build.outputs.web_image }}",
            "previousWebImage": "${{ steps.before.outputs.old_web_image }}",
            "apiDeployment": "unchanged",
            "migrations": "unchanged",
            "servedBundleValidation": "passed"
          }
          JSON

      - name: Upload dashboard hotfix deployment evidence
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: dashboard-hotfix-test-deployment-${{ github.run_id }}
          path: evidence/dashboard-hotfix-test-deployment.json
          retention-days: 30

      - name: Roll back web image on failure
        if: ${{ failure() && steps.deploy_web.outputs.started == 'true' }}
        shell: bash
        run: |
          set +e
          echo 'Dashboard hotfix deployment failed. Restoring the captured web image.' >&2
          az containerapp update \
            -g '${{ vars.AZURE_RESOURCE_GROUP }}' \
            -n '${{ vars.AZURE_WEB_APP }}' \
            --image '${{ steps.before.outputs.old_web_image }}' \
            --revision-suffix "dashrb-${GITHUB_RUN_ID}" \
            --output none
