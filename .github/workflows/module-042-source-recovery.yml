name: Module 042 validated source recovery

on:
  push:
    branches:
      - source/invoice-billing-center-preview-20260714
    paths:
      - .module042-recovery/trigger

permissions:
  contents: write

concurrency:
  group: module-042-source-recovery
  cancel-in-progress: false

jobs:
  restore-build-commit:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Check out Module 042 branch
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: source/invoice-billing-center-preview-20260714

      - name: Set up .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: src/frontend/project-time-web/package-lock.json

      - name: Reconstruct validated Module 042 source
        shell: bash
        run: |
          set -Eeuo pipefail

          base64 --decode .module042-recovery/InvoiceBillingModule.cs.gz.b64 \
            | gzip --decompress \
            > src/backend/ProjectTime.Api/Modules/InvoiceBillingModule.cs

          base64 --decode .module042-recovery/InvoiceBillingCenter.jsx.gz.b64 \
            | gzip --decompress \
            > src/frontend/project-time-web/src/InvoiceBillingCenter.jsx

          printf '%s  %s\n' \
            'f3c98b960b42114d8b87a4597ef5629927964117f9425ae6c2e3b94069a4d656' \
            'src/backend/ProjectTime.Api/Modules/InvoiceBillingModule.cs' \
            | sha256sum --check --strict

          printf '%s  %s\n' \
            '9a56eaf929f9c2380e23b49f976acd3612a38408428650fb28c7cf8fcc81af14' \
            'src/frontend/project-time-web/src/InvoiceBillingCenter.jsx' \
            | sha256sum --check --strict

      - name: Register billing endpoints in Program.cs
        shell: python
        run: |
          from pathlib import Path

          path = Path('src/backend/ProjectTime.Api/Program.cs')
          text = path.read_text(encoding='utf-8')
          registration = 'ProjectTime.Api.Modules.InvoiceBillingModule.MapInvoiceBillingEndpoints(app);'

          if text.count(registration) > 1:
              raise SystemExit('Duplicate Module 042 endpoint registration detected.')

          if registration not in text:
              anchor = 'app.Run();'
              if text.count(anchor) != 1:
                  raise SystemExit(f'Expected exactly one app.Run() anchor; found {text.count(anchor)}.')

              block = (
                  '/* 042_LIVE_BILLING_API_MAP_START */\n'
                  f'{registration}\n'
                  '/* 042_LIVE_BILLING_API_MAP_END */\n\n'
              )
              text = text.replace(anchor, block + anchor, 1)
              path.write_text(text, encoding='utf-8')

      - name: Validate source contract
        shell: bash
        run: |
          set -Eeuo pipefail

          grep -F 'ProjectTime.Api.Modules.InvoiceBillingModule.MapInvoiceBillingEndpoints(app);' \
            src/backend/ProjectTime.Api/Program.cs

          grep -F '"/api/billing/candidates"' \
            src/backend/ProjectTime.Api/Modules/InvoiceBillingModule.cs
          grep -F '"/api/billing/projects/{projectId:guid}/candidates"' \
            src/backend/ProjectTime.Api/Modules/InvoiceBillingModule.cs
          grep -F '"/api/billing/projects/{projectId:guid}/invoices"' \
            src/backend/ProjectTime.Api/Modules/InvoiceBillingModule.cs
          grep -F '"/api/billing/invoices/{invoiceId:guid}"' \
            src/backend/ProjectTime.Api/Modules/InvoiceBillingModule.cs

          grep -F '/api/billing/candidates' \
            src/frontend/project-time-web/src/InvoiceBillingCenter.jsx
          grep -F 'PHD-XXXXXX-N' \
            src/frontend/project-time-web/src/InvoiceBillingCenter.jsx

          if grep -F '/api/work-register/overview' \
            src/frontend/project-time-web/src/InvoiceBillingCenter.jsx; then
            echo 'Legacy Work Register overview dependency remains in Module 042 UI.' >&2
            exit 1
          fi

          git diff --check

      - name: Build backend
        run: dotnet build src/backend/ProjectTime.Api/ProjectTime.Api.csproj --configuration Release

      - name: Install frontend dependencies
        working-directory: src/frontend/project-time-web
        run: npm ci

      - name: Build frontend
        working-directory: src/frontend/project-time-web
        run: npm run build

      - name: Validate production bundle
        shell: bash
        run: |
          set -Eeuo pipefail
          grep -R -F '/api/billing/candidates' src/frontend/project-time-web/dist/assets
          grep -R -F 'PHD-XXXXXX-N' src/frontend/project-time-web/dist/assets

      - name: Remove temporary recovery payload
        shell: bash
        run: |
          set -Eeuo pipefail
          git rm -r .module042-recovery
          git rm .github/workflows/module-042-source-recovery.yml

      - name: Commit validated Module 042 implementation
        shell: bash
        run: |
          set -Eeuo pipefail

          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'

          git add \
            src/backend/ProjectTime.Api/Modules/InvoiceBillingModule.cs \
            src/backend/ProjectTime.Api/Program.cs \
            src/frontend/project-time-web/src/InvoiceBillingCenter.jsx

          git diff --cached --check

          git commit -m 'MODULE 042: implement live billing candidates and invoices'
          git push origin HEAD:source/invoice-billing-center-preview-20260714
