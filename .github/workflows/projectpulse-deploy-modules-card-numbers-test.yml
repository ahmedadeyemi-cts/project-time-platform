name: ProjectPulse Deploy Modules Card Numbers Test

on:
  workflow_dispatch:
    inputs:
      release_commit:
        description: Exact verified Modules card-number commit
        required: true
        default: dffeae27cbebe4a66f5c35a52624423790eb9537
        type: string
      confirmation:
        description: Enter DEPLOY-MODULE-NUMBERS-TO-TEST
        required: true
        type: string

permissions:
  id-token: write
  contents: read

concurrency:
  group: projectpulse-deploy-modules-card-numbers-test
  cancel-in-progress: false

jobs:
  deploy-web:
    name: Guarded Modules card-number web-only test deployment
    environment: test
    runs-on: ubuntu-latest
    env:
      EXPECTED_RELEASE_COMMIT: dffeae27cbebe4a66f5c35a52624423790eb9537
    steps:
      - name: Check out deployment controls
        uses: actions/checkout@v5
        with:
          path: control
          fetch-depth: 0

      - name: Check out exact Modules card-number source
        uses: actions/checkout@v5
        with:
          ref: ${{ inputs.release_commit }}
          path: release
          fetch-depth: 1

      - name: Guard workflow source and Modules card-number commit
        id: release
        shell: bash
        run: |
          set -Eeuo pipefail
          [[ '${{ github.ref }}' == 'refs/heads/main' ]] || {
            echo 'This workflow must be dispatched from main.' >&2
            exit 1
          }
          [[ '${{ inputs.confirmation }}' == 'DEPLOY-MODULE-NUMBERS-TO-TEST' ]] || {
            echo 'The deployment confirmation text does not match.' >&2
            exit 1
          }
          [[ '${{ inputs.release_commit }}' =~ ^[0-9a-f]{40}$ ]] || {
            echo 'release_commit must be a complete 40-character SHA.' >&2
            exit 1
          }

          CONTROL_COMMIT="$(git -C control rev-parse HEAD)"
          TARGET_COMMIT="$(git -C release rev-parse HEAD)"
          [[ "$CONTROL_COMMIT" == '${{ github.sha }}' ]] || {
            echo 'The checked-out control commit does not match this workflow run.' >&2
            exit 1
          }
          [[ "$TARGET_COMMIT" == '${{ inputs.release_commit }}' ]] || {
            echo 'The checked-out release does not match the requested commit.' >&2
            exit 1
          }
          [[ "$TARGET_COMMIT" == "$EXPECTED_RELEASE_COMMIT" ]] || {
            echo 'Only the verified Modules card-number commit may be deployed.' >&2
            exit 1
          }
          git -C control merge-base --is-ancestor "$TARGET_COMMIT" HEAD || {
            echo 'The Modules card-number release is not an ancestor of the deployment-control commit.' >&2
            exit 1
          }

          PORTAL='release/src/frontend/project-time-web/src/ModulesDirectoryPortal.jsx'
          grep -Fq 'CANONICAL_MODULE_NUMBER_BY_ROUTE' "$PORTAL"
          grep -Fq 'moduleNumberForRoute' "$PORTAL"
          grep -Fq "'rate-card-administration': '055B'" "$PORTAL"
          grep -Fq "'work-register': '055C'" "$PORTAL"
          grep -Fq "'create-work-register': '055D'" "$PORTAL"
          grep -Fq "'user-guide': '999'" "$PORTAL"
          grep -Fq 'Search by module number, name, route, or category' "$PORTAL"
          grep -Fq 'Module number unavailable' "$PORTAL"
          grep -Fq 'ModulesDirectoryPortal' release/src/frontend/project-time-web/src/main.jsx
          echo "target_commit=$TARGET_COMMIT" >> "$GITHUB_OUTPUT"

      - uses: azure/login@v2
        with:
          client-id: ${{ vars.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}

      - name: Capture current web image
        id: before
        shell: bash
        run: |
          set -Eeuo pipefail
          RAW_OLD_WEB_IMAGE="$(az containerapp show -g '${{ vars.AZURE_RESOURCE_GROUP }}' -n '${{ vars.AZURE_WEB_APP }}' --query 'properties.template.containers[0].image' -o tsv)"
          WEB_REVISION_MODE="$(az containerapp show -g '${{ vars.AZURE_RESOURCE_GROUP }}' -n '${{ vars.AZURE_WEB_APP }}' --query 'properties.configuration.activeRevisionsMode' -o tsv)"
          [[ -n "$RAW_OLD_WEB_IMAGE" ]] || {
            echo 'Could not capture the active web image.' >&2
            exit 1
          }
          [[ "${WEB_REVISION_MODE,,}" == 'single' ]] || {
            echo 'The web Container App must use single-revision mode.' >&2
            exit 1
          }

          resolve_acr_image_digest() {
            local image="$1"
            local registry='${{ vars.AZURE_ACR_NAME }}.azurecr.io/'
            local relative repository digest
            case "$image" in
              "$registry"*@sha256:*) printf '%s\n' "$image"; return 0 ;;
              "$registry"*:*) ;;
              *) echo "Rollback image is outside the approved ACR: $image" >&2; return 1 ;;
            esac
            relative="${image#"$registry"}"
            repository="${relative%:*}"
            digest="$(az acr repository show --name '${{ vars.AZURE_ACR_NAME }}' --image "$relative" --query digest -o tsv)"
            [[ "$digest" == sha256:* ]] || {
              echo "Could not resolve rollback digest for $image." >&2
              return 1
            }
            printf '%s%s@%s\n' "$registry" "$repository" "$digest"
          }

          OLD_WEB_IMAGE="$(resolve_acr_image_digest "$RAW_OLD_WEB_IMAGE")"
          echo "old_web_image=$OLD_WEB_IMAGE" >> "$GITHUB_OUTPUT"
          echo "CURRENT_WEB_IMAGE_IMMUTABLE=$OLD_WEB_IMAGE"

      - name: Build exact Modules card-number web image
        id: build
        shell: bash
        working-directory: release
        run: |
          set -Eeuo pipefail
          TARGET_COMMIT='${{ steps.release.outputs.target_commit }}'
          WEB_REPOSITORY='project-health-dashboard-web'
          RELEASE_TAG="modules-card-numbers-$TARGET_COMMIT"
          WEB_DIGEST="$(
            ../control/scripts/build-pr55-acr-image.sh \
              '${{ vars.AZURE_ACR_NAME }}' \
              "$WEB_REPOSITORY:$RELEASE_TAG" \
              deployment/containers/web/Dockerfile \
              .
          )"
          WEB_IMAGE='${{ vars.AZURE_ACR_NAME }}.azurecr.io/'"$WEB_REPOSITORY@$WEB_DIGEST"
          echo "web_image=$WEB_IMAGE" >> "$GITHUB_OUTPUT"
          echo "IMMUTABLE_WEB_IMAGE=$WEB_IMAGE"

      - name: Deploy Modules card-number web image only
        id: deploy_web
        shell: bash
        run: |
          set -Eeuo pipefail
          echo 'started=true' >> "$GITHUB_OUTPUT"
          az containerapp update \
            -g '${{ vars.AZURE_RESOURCE_GROUP }}' \
            -n '${{ vars.AZURE_WEB_APP }}' \
            --image '${{ steps.build.outputs.web_image }}' \
            --revision-suffix "modnum-${GITHUB_RUN_ID}" \
            --output none

      - name: Validate served Modules card numbers and web image
        shell: bash
        run: |
          set -Eeuo pipefail
          BASE_URL='${{ vars.PUBLIC_URL }}'
          BASE_URL="${BASE_URL%/}"
          READY='false'
          LAST_STATUS='not-requested'
          LAST_JS='not-resolved'
          LAST_CSS='not-resolved'

          absolute_asset_url() {
            local asset_path="$1"
            case "$asset_path" in
              http://*|https://*) printf '%s\n' "$asset_path" ;;
              /*) printf '%s%s\n' "$BASE_URL" "$asset_path" ;;
              *) printf '%s/%s\n' "$BASE_URL" "$asset_path" ;;
            esac
          }

          for attempt in $(seq 1 30); do
            CACHE_BUSTER="modnum-${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}-${attempt}"
            STATUS="$(curl --silent --show-error --location --header 'Cache-Control: no-cache' --header 'Pragma: no-cache' --output /tmp/modnum-index.html --write-out '%{http_code}' "$BASE_URL/?release_check=$CACHE_BUSTER" || true)"
            LAST_STATUS="$STATUS"
            LAST_JS='not-resolved'
            LAST_CSS='not-resolved'

            if [[ "$STATUS" == '200' ]]; then
              JS_PATH="$(sed -nE 's/.*src="([^"]+\.js)".*/\1/p' /tmp/modnum-index.html | head -1)"
              mapfile -t CSS_PATHS < <(sed -nE 's/.*href="([^"]+\.css)".*/\1/p' /tmp/modnum-index.html)
              if [[ -n "$JS_PATH" && ${#CSS_PATHS[@]} -gt 0 ]]; then
                LAST_JS="$JS_PATH"
                LAST_CSS="$(IFS='|'; echo "${CSS_PATHS[*]}")"
                JS_URL="$(absolute_asset_url "$JS_PATH")"
                JS_STATUS="$(curl --silent --show-error --location --header 'Cache-Control: no-cache' --header 'Pragma: no-cache' --output /tmp/modnum-app.js --write-out '%{http_code}' "$JS_URL?release_check=$CACHE_BUSTER" || true)"

                : > /tmp/modnum-all.css
                CSS_OK='true'
                for CSS_PATH in "${CSS_PATHS[@]}"; do
                  CSS_URL="$(absolute_asset_url "$CSS_PATH")"
                  CSS_STATUS="$(curl --silent --show-error --location --header 'Cache-Control: no-cache' --header 'Pragma: no-cache' --output /tmp/modnum-one.css --write-out '%{http_code}' "$CSS_URL?release_check=$CACHE_BUSTER" || true)"
                  if [[ "$CSS_STATUS" != '200' ]]; then CSS_OK='false'; fi
                  cat /tmp/modnum-one.css >> /tmp/modnum-all.css
                done

                LAST_STATUS="html=$STATUS,js=$JS_STATUS,css=$CSS_OK"
                tr -d '[:space:]' < /tmp/modnum-all.css > /tmp/modnum-all.compact.css
                if [[ "$JS_STATUS" == '200' && "$CSS_OK" == 'true' ]] \
                  && grep -Fq 'projectpulse-modules-navigation-link' /tmp/modnum-app.js \
                  && grep -Fq 'Search by module number, name, route, or category' /tmp/modnum-app.js \
                  && grep -Fq 'Module number unavailable' /tmp/modnum-app.js \
                  && grep -Fq 'rate-card-administration' /tmp/modnum-app.js \
                  && grep -Fq 'create-work-register' /tmp/modnum-app.js \
                  && grep -Fq 'user-guide' /tmp/modnum-app.js \
                  && grep -Fq 'main.app-shell.route-modules' /tmp/modnum-all.compact.css \
                  && grep -Fq 'modules-directory-grid' /tmp/modnum-all.compact.css; then
                  READY='true'
                  echo "MODULES_CARD_NUMBERS_READY attempt=$attempt js=$JS_PATH css=$LAST_CSS"
                  break
                fi
              fi
            fi
            (( attempt < 30 )) && sleep 10
          done

          [[ "$READY" == 'true' ]] || {
            echo "Modules card-number assets did not become ready: HTTP=$LAST_STATUS JS=$LAST_JS CSS=$LAST_CSS" >&2
            exit 1
          }

          ACTIVE_WEB_IMAGE="$(az containerapp show -g '${{ vars.AZURE_RESOURCE_GROUP }}' -n '${{ vars.AZURE_WEB_APP }}' --query 'properties.template.containers[0].image' -o tsv)"
          [[ "$ACTIVE_WEB_IMAGE" == '${{ steps.build.outputs.web_image }}' ]] || {
            echo "Active web image mismatch: expected=${{ steps.build.outputs.web_image }} actual=$ACTIVE_WEB_IMAGE" >&2
            exit 1
          }
          echo "DEPLOYED_MODULES_CARD_NUMBER_COMMIT=${{ steps.release.outputs.target_commit }}"
          echo "DEPLOYED_WEB_IMAGE=$ACTIVE_WEB_IMAGE"

      - name: Write Modules card-number deployment evidence
        if: success()
        shell: bash
        run: |
          set -Eeuo pipefail
          mkdir -p evidence
          cat > evidence/modules-card-numbers-test-deployment.json <<JSON
          {
            "environment": "test",
            "releaseCommit": "${{ steps.release.outputs.target_commit }}",
            "workflowCommit": "${{ github.sha }}",
            "runId": "${{ github.run_id }}",
            "webImage": "${{ steps.build.outputs.web_image }}",
            "previousWebImage": "${{ steps.before.outputs.old_web_image }}",
            "apiDeployment": "unchanged",
            "migrations": "unchanged",
            "servedAssetValidation": "passed"
          }
          JSON

      - name: Upload Modules card-number deployment evidence
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: modules-card-numbers-test-deployment-${{ github.run_id }}
          path: evidence/modules-card-numbers-test-deployment.json
          retention-days: 30

      - name: Roll back web image on failure
        if: ${{ failure() && steps.deploy_web.outputs.started == 'true' }}
        shell: bash
        run: |
          set +e
          echo 'Modules card-number deployment failed. Restoring the captured web image.' >&2
          az containerapp update \
            -g '${{ vars.AZURE_RESOURCE_GROUP }}' \
            -n '${{ vars.AZURE_WEB_APP }}' \
            --image '${{ steps.before.outputs.old_web_image }}' \
            --revision-suffix "modnumrb-${GITHUB_RUN_ID}" \
            --output none
