name: ProjectPulse Deploy Scoped RBAC Test

on:
  workflow_dispatch:
    inputs:
      release_commit:
        description: Exact verified scoped RBAC release commit
        required: true
        default: 19c7bee92e513b79ef83cc3b6ad3d2a781aa5b67
        type: string
      confirmation:
        description: Enter DEPLOY-SCOPED-RBAC-TO-TEST
        required: true
        type: string

permissions:
  id-token: write
  contents: read

concurrency:
  group: projectpulse-deploy-scoped-rbac-test
  cancel-in-progress: false

jobs:
  deploy:
    name: Guarded scoped RBAC test deployment
    environment: test
    runs-on: ubuntu-latest
    env:
      EXPECTED_RELEASE_COMMIT: 19c7bee92e513b79ef83cc3b6ad3d2a781aa5b67
    steps:
      - name: Check out deployment controls
        uses: actions/checkout@v5
        with:
          path: control
          fetch-depth: 0

      - name: Check out exact scoped RBAC release
        uses: actions/checkout@v5
        with:
          ref: ${{ inputs.release_commit }}
          path: release
          fetch-depth: 1

      - name: Guard workflow source and release
        id: release
        shell: bash
        run: |
          set -Eeuo pipefail
          [[ '${{ github.ref }}' == 'refs/heads/main' ]] || { echo 'Dispatch this workflow from main.' >&2; exit 1; }
          [[ '${{ inputs.confirmation }}' == 'DEPLOY-SCOPED-RBAC-TO-TEST' ]] || { echo 'Confirmation text does not match.' >&2; exit 1; }
          [[ '${{ inputs.release_commit }}' =~ ^[0-9a-f]{40}$ ]] || { echo 'release_commit must be a complete SHA.' >&2; exit 1; }
          CONTROL_COMMIT="$(git -C control rev-parse HEAD)"
          TARGET_COMMIT="$(git -C release rev-parse HEAD)"
          [[ "$CONTROL_COMMIT" == '${{ github.sha }}' ]]
          [[ "$TARGET_COMMIT" == '${{ inputs.release_commit }}' ]]
          [[ "$TARGET_COMMIT" == "$EXPECTED_RELEASE_COMMIT" ]] || { echo 'Only the verified scoped RBAC release may deploy.' >&2; exit 1; }
          git -C control merge-base --is-ancestor "$TARGET_COMMIT" HEAD || { echo 'Release is not an ancestor of deployment controls.' >&2; exit 1; }
          test -f release/database/migrations/040_scoped_role_policy_versions.sql
          test -f release/src/backend/ProjectTime.Api/Modules/ScopedAuthorizationEvaluator.cs
          grep -Fq 'Authoritative, versioned administration' release/src/frontend/project-time-web/src/RoleAdminDirectoryPanel.jsx
          grep -Fq 'Strictly read-only representation' release/src/frontend/project-time-web/src/RolesPermissionsMatrix.jsx
          echo "target_commit=$TARGET_COMMIT" >> "$GITHUB_OUTPUT"

      - uses: azure/login@v2
        with:
          client-id: ${{ vars.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}

      - name: Load test database connection
        env:
          AZURE_RESOURCE_GROUP: ${{ vars.AZURE_RESOURCE_GROUP }}
          AZURE_API_APP: ${{ vars.AZURE_API_APP }}
        run: bash control/scripts/export-pr55-test-database-url.sh

      - name: Capture current API and web images
        id: before
        shell: bash
        run: |
          set -Eeuo pipefail
          RAW_API="$(az containerapp show -g '${{ vars.AZURE_RESOURCE_GROUP }}' -n '${{ vars.AZURE_API_APP }}' --query 'properties.template.containers[0].image' -o tsv)"
          RAW_WEB="$(az containerapp show -g '${{ vars.AZURE_RESOURCE_GROUP }}' -n '${{ vars.AZURE_WEB_APP }}' --query 'properties.template.containers[0].image' -o tsv)"
          API_MODE="$(az containerapp show -g '${{ vars.AZURE_RESOURCE_GROUP }}' -n '${{ vars.AZURE_API_APP }}' --query 'properties.configuration.activeRevisionsMode' -o tsv)"
          WEB_MODE="$(az containerapp show -g '${{ vars.AZURE_RESOURCE_GROUP }}' -n '${{ vars.AZURE_WEB_APP }}' --query 'properties.configuration.activeRevisionsMode' -o tsv)"
          [[ -n "$RAW_API" && -n "$RAW_WEB" && "${API_MODE,,}" == single && "${WEB_MODE,,}" == single ]]
          resolve_digest() {
            local image="$1" registry='${{ vars.AZURE_ACR_NAME }}.azurecr.io/' relative repository digest
            case "$image" in "$registry"*@sha256:*) printf '%s\n' "$image"; return;; "$registry"*:*) ;; *) return 1;; esac
            relative="${image#"$registry"}"; repository="${relative%:*}"
            digest="$(az acr repository show --name '${{ vars.AZURE_ACR_NAME }}' --image "$relative" --query digest -o tsv)"
            [[ "$digest" == sha256:* ]]
            printf '%s%s@%s\n' "$registry" "$repository" "$digest"
          }
          OLD_API="$(resolve_digest "$RAW_API")"; OLD_WEB="$(resolve_digest "$RAW_WEB")"
          echo "old_api_image=$OLD_API" >> "$GITHUB_OUTPUT"
          echo "old_web_image=$OLD_WEB" >> "$GITHUB_OUTPUT"

      - name: Build immutable API and web images
        id: build
        working-directory: release
        shell: bash
        run: |
          set -Eeuo pipefail
          SHA='${{ steps.release.outputs.target_commit }}'
          API_REPO='project-health-dashboard-api'; WEB_REPO='project-health-dashboard-web'
          API_DIGEST="$(../control/scripts/build-pr55-acr-image.sh '${{ vars.AZURE_ACR_NAME }}' "$API_REPO:scoped-rbac-$SHA" deployment/containers/api/Dockerfile .)"
          WEB_DIGEST="$(../control/scripts/build-pr55-acr-image.sh '${{ vars.AZURE_ACR_NAME }}' "$WEB_REPO:scoped-rbac-$SHA" deployment/containers/web/Dockerfile .)"
          echo "api_image=${{ vars.AZURE_ACR_NAME }}.azurecr.io/$API_REPO@$API_DIGEST" >> "$GITHUB_OUTPUT"
          echo "web_image=${{ vars.AZURE_ACR_NAME }}.azurecr.io/$WEB_REPO@$WEB_DIGEST" >> "$GITHUB_OUTPUT"

      - name: Build checksum-pinned migration 040 image
        id: migration
        shell: bash
        run: |
          set -Eeuo pipefail
          CONTEXT="$RUNNER_TEMP/scoped-rbac-migrator-${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}"
          install -d -m 0700 "$CONTEXT/migrations"
          install -m 0644 control/deployment/containers/pr55-migrator/Dockerfile "$CONTEXT/Dockerfile"
          install -m 0755 control/scripts/apply-scoped-rbac-test-migration.sh "$CONTEXT/apply-pr55-test-migrations.sh"
          install -m 0644 release/database/migrations/040_scoped_role_policy_versions.sql "$CONTEXT/migrations/040_scoped_role_policy_versions.sql"
          cp -R release/database/migrations/040_scoped_role_policy_versions "$CONTEXT/migrations/"
          printf '%s\n' '${{ steps.release.outputs.target_commit }}' > "$CONTEXT/release-commit"
          DIGEST="$(control/scripts/build-pr55-acr-image.sh '${{ vars.AZURE_ACR_NAME }}' "project-health-dashboard-rbac-migrator:${{ steps.release.outputs.target_commit }}-${GITHUB_SHA:0:12}" "$CONTEXT/Dockerfile" "$CONTEXT")"
          echo "image=${{ vars.AZURE_ACR_NAME }}.azurecr.io/project-health-dashboard-rbac-migrator@$DIGEST" >> "$GITHUB_OUTPUT"

      - name: Apply and verify migration 040 inside private network
        shell: bash
        env:
          AZURE_RESOURCE_GROUP: ${{ vars.AZURE_RESOURCE_GROUP }}
          AZURE_API_APP: ${{ vars.AZURE_API_APP }}
          AZURE_ACR_NAME: ${{ vars.AZURE_ACR_NAME }}
          SCOPED_RBAC_MIGRATION_IMAGE: ${{ steps.migration.outputs.image }}
          SCOPED_RBAC_MIGRATION_JOB_NAME: rbac-mig-${{ github.run_id }}-${{ github.run_attempt }}
        run: bash control/scripts/run-scoped-rbac-test-migration-job.sh

      - name: Deploy API
        id: deploy_api
        shell: bash
        run: |
          set -Eeuo pipefail
          echo 'started=true' >> "$GITHUB_OUTPUT"
          az containerapp update -g '${{ vars.AZURE_RESOURCE_GROUP }}' -n '${{ vars.AZURE_API_APP }}' \
            --image '${{ steps.build.outputs.api_image }}' \
            --set-env-vars PROJECTPULSE_ENVIRONMENT=test PROJECTPULSE_SOURCE_COMMIT='${{ steps.release.outputs.target_commit }}' \
            --revision-suffix "rbacapi-${GITHUB_RUN_ID}" --output none

      - name: Validate API and scoped authorization routes
        shell: bash
        run: |
          set -Eeuo pipefail
          BASE='${{ vars.PUBLIC_URL }}'; BASE="${BASE%/}"
          wait_status() { local url="$1" expected="$2" status=''; for i in $(seq 1 30); do status="$(curl -sS -o /tmp/response -w '%{http_code}' "$url" || true)"; [[ ",$expected," == *",$status,"* ]] && return 0; sleep 10; done; echo "$url returned $status" >&2; cat /tmp/response >&2 || true; return 1; }
          wait_status "$BASE/health" '200'
          wait_status "$BASE/api/version" '200'
          wait_status "$BASE/api/role-policy/summary" '401,403'
          wait_status "$BASE/api/role-policy/matrix" '401,403'
          wait_status "$BASE/api/scoped-authorization/evaluate?moduleCode=003&actionCode=UTILIZATION_VIEW" '401,403'

      - name: Deploy web
        id: deploy_web
        shell: bash
        run: |
          set -Eeuo pipefail
          echo 'started=true' >> "$GITHUB_OUTPUT"
          az containerapp update -g '${{ vars.AZURE_RESOURCE_GROUP }}' -n '${{ vars.AZURE_WEB_APP }}' \
            --image '${{ steps.build.outputs.web_image }}' --revision-suffix "rbacweb-${GITHUB_RUN_ID}" --output none

      - name: Validate served scoped RBAC web and active images
        shell: bash
        run: |
          set -Eeuo pipefail
          BASE='${{ vars.PUBLIC_URL }}'; BASE="${BASE%/}"; READY=false
          for i in $(seq 1 30); do
            BUSTER="rbac-${GITHUB_RUN_ID}-${i}"
            STATUS="$(curl -sSL -H 'Cache-Control: no-cache' -o /tmp/index.html -w '%{http_code}' "$BASE/?release_check=$BUSTER" || true)"
            JS="$(sed -nE 's/.*src="([^"]+\.js)".*/\1/p' /tmp/index.html | head -1)"
            if [[ "$STATUS" == 200 && -n "$JS" ]]; then
              case "$JS" in http*) URL="$JS";; /*) URL="$BASE$JS";; *) URL="$BASE/$JS";; esac
              curl -sSL -H 'Cache-Control: no-cache' -o /tmp/app.js "$URL?release_check=$BUSTER" || true
              if grep -Fq 'Authoritative, versioned administration' /tmp/app.js && grep -Fq 'Strictly read-only representation' /tmp/app.js; then READY=true; break; fi
            fi
            sleep 10
          done
          [[ "$READY" == true ]] || { echo 'Scoped RBAC web markers were not served.' >&2; exit 1; }
          ACTIVE_API="$(az containerapp show -g '${{ vars.AZURE_RESOURCE_GROUP }}' -n '${{ vars.AZURE_API_APP }}' --query 'properties.template.containers[0].image' -o tsv)"
          ACTIVE_WEB="$(az containerapp show -g '${{ vars.AZURE_RESOURCE_GROUP }}' -n '${{ vars.AZURE_WEB_APP }}' --query 'properties.template.containers[0].image' -o tsv)"
          [[ "$ACTIVE_API" == '${{ steps.build.outputs.api_image }}' && "$ACTIVE_WEB" == '${{ steps.build.outputs.web_image }}' ]]

      - name: Write deployment evidence
        if: success()
        shell: bash
        run: |
          mkdir -p evidence
          cat > evidence/scoped-rbac-test-deployment.json <<JSON
          {"environment":"test","releaseCommit":"${{ steps.release.outputs.target_commit }}","workflowCommit":"${{ github.sha }}","runId":"${{ github.run_id }}","migration040":"applied-and-verified","migrationImage":"${{ steps.migration.outputs.image }}","apiImage":"${{ steps.build.outputs.api_image }}","webImage":"${{ steps.build.outputs.web_image }}","previousApiImage":"${{ steps.before.outputs.old_api_image }}","previousWebImage":"${{ steps.before.outputs.old_web_image }}"}
          JSON

      - name: Upload deployment evidence
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: scoped-rbac-test-deployment-${{ github.run_id }}
          path: evidence/scoped-rbac-test-deployment.json
          retention-days: 30

      - name: Roll back API and web images on failure
        if: ${{ failure() && (steps.deploy_api.outputs.started == 'true' || steps.deploy_web.outputs.started == 'true') }}
        shell: bash
        run: |
          set +e
          az containerapp update -g '${{ vars.AZURE_RESOURCE_GROUP }}' -n '${{ vars.AZURE_API_APP }}' --image '${{ steps.before.outputs.old_api_image }}' --revision-suffix "rbacapirb-${GITHUB_RUN_ID}" --output none
          az containerapp update -g '${{ vars.AZURE_RESOURCE_GROUP }}' -n '${{ vars.AZURE_WEB_APP }}' --image '${{ steps.before.outputs.old_web_image }}' --revision-suffix "rbacwebrb-${GITHUB_RUN_ID}" --output none
