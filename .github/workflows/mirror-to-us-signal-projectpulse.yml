name: Mirror ProjectPulse to US Signal

on:
  push:
    branches:
      - "**"
    tags:
      - "**"

  schedule:
    # Scheduled reconciliation in UTC.
    - cron: "17,47 * * * *"

  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: projectpulse-us-signal-mirror
  cancel-in-progress: false

jobs:
  mirror:
    name: Mirror branches and tags

    # Prevent the copied workflow from mirroring back from the destination.
    if: github.repository == 'ahmedadeyemi-cts/project-time-platform'

    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Validate mirror credential
        env:
          MIRROR_TOKEN: ${{ secrets.PROJECTPULSE_MIRROR_TOKEN }}
        shell: bash
        run: |
          set -Eeuo pipefail

          if [[ -z "${MIRROR_TOKEN:-}" ]]; then
            echo "PROJECTPULSE_MIRROR_TOKEN is missing."
            exit 1
          fi

          echo "MIRROR_CREDENTIAL_PRESENT=YES"

      - name: Mirror source branches and tags
        env:
          SOURCE_TOKEN: ${{ github.token }}
          MIRROR_TOKEN: ${{ secrets.PROJECTPULSE_MIRROR_TOKEN }}
        shell: bash
        run: |
          set -Eeuo pipefail
          umask 077
          set +x

          SOURCE_REPOSITORY="ahmedadeyemi-cts/project-time-platform"
          DESTINATION_REPOSITORY="US-Signal-Technical-Operations-Center/ProjectPulse"

          SOURCE_URL="https://x-access-token:${SOURCE_TOKEN}@github.com/${SOURCE_REPOSITORY}.git"
          DESTINATION_URL="https://x-access-token:${MIRROR_TOKEN}@github.com/${DESTINATION_REPOSITORY}.git"

          echo "SOURCE_REPOSITORY=${SOURCE_REPOSITORY}"
          echo "DESTINATION_REPOSITORY=${DESTINATION_REPOSITORY}"

          git clone --mirror "$SOURCE_URL" projectpulse-source.git

          git -C projectpulse-source.git remote add destination "$DESTINATION_URL"

          git -C projectpulse-source.git push --prune destination \
            "+refs/heads/*:refs/heads/*" \
            "+refs/tags/*:refs/tags/*"

          echo "MIRROR_PUSH=SUCCESS"

      - name: Verify source and destination refs
        env:
          SOURCE_TOKEN: ${{ github.token }}
          MIRROR_TOKEN: ${{ secrets.PROJECTPULSE_MIRROR_TOKEN }}
        shell: bash
        run: |
          set -Eeuo pipefail
          umask 077
          set +x

          SOURCE_REPOSITORY="ahmedadeyemi-cts/project-time-platform"
          DESTINATION_REPOSITORY="US-Signal-Technical-Operations-Center/ProjectPulse"

          SOURCE_URL="https://x-access-token:${SOURCE_TOKEN}@github.com/${SOURCE_REPOSITORY}.git"
          DESTINATION_URL="https://x-access-token:${MIRROR_TOKEN}@github.com/${DESTINATION_REPOSITORY}.git"

          git ls-remote --heads --tags "$SOURCE_URL" \
            | awk '{ print $1 " " $2 }' \
            | sort > source.refs

          git ls-remote --heads --tags "$DESTINATION_URL" \
            | awk '{ print $1 " " $2 }' \
            | sort > destination.refs

          echo "SOURCE_REF_COUNT=$(wc -l < source.refs | tr -d ' ')"
          echo "DESTINATION_REF_COUNT=$(wc -l < destination.refs | tr -d ' ')"

          diff -u source.refs destination.refs

          echo "MIRROR_VALIDATION=PASSED"
          echo "MIRROR_SOURCE=${SOURCE_REPOSITORY}"
          echo "MIRROR_DESTINATION=${DESTINATION_REPOSITORY}"
