name: ProjectPulse CI

on:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: projectpulse-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: src/frontend/project-time-web/package-lock.json

      - name: Restore and build API
        shell: bash
        run: |
          set +e
          dotnet build src/backend/ProjectTime.Api/ProjectTime.Api.csproj --configuration Release > /tmp/projectpulse-api-build.log 2>&1
          status=$?
          if [[ $status -ne 0 ]]; then
            echo 'SCOPED_RBAC_API_BUILD_ERRORS_BEGIN'
            grep -E 'error (CS|MSB|NU)|Build FAILED|error:' /tmp/projectpulse-api-build.log | tail -n 120 || tail -n 120 /tmp/projectpulse-api-build.log
            echo 'SCOPED_RBAC_API_BUILD_ERRORS_END'
            exit $status
          fi
          cat /tmp/projectpulse-api-build.log

      - name: Upload API compiler diagnostics
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: scoped-rbac-api-build-diagnostics
          path: /tmp/projectpulse-api-build.log
          retention-days: 7

      - name: Test Work Register project authorization
        run: dotnet run --project tests/ProjectTime.Api.AuthorizationTests/ProjectTime.Api.AuthorizationTests.csproj --configuration Release

      - name: Install frontend dependencies
        working-directory: src/frontend/project-time-web
        run: npm ci --no-audit --no-fund

      - name: Build frontend
        working-directory: src/frontend/project-time-web
        run: npm run build

      - name: Validate PR55 test deployment guard
        run: scripts/validate-pr55-test-deployment.sh

      - name: Validate dashboard hotfix test deployment guard
        run: bash scripts/validate-dashboard-hotfix-test-deployment.sh

      - name: Validate Modules page test deployment guard
        run: bash scripts/validate-modules-page-test-deployment.sh

      - name: Validate Approval Center hotfix test deployment guard
        run: bash scripts/validate-approval-access-hotfix-test-deployment.sh

      - name: Validate dashboard calendar test deployment guard
        run: bash scripts/validate-dashboard-calendar-test-deployment.sh

      - name: Validate Modules card-number test deployment guard
        run: bash scripts/validate-modules-card-numbers-test-deployment.sh

      - name: Validate container definitions and web build context
        run: |
          test -f deployment/containers/api/Dockerfile
          test -f deployment/containers/web/Dockerfile
          docker build \
            --file deployment/containers/web/Dockerfile \
            --tag "projectpulse-web-ci:${GITHUB_SHA}" \
            .

      - name: Generate release manifest
        run: |
          mkdir -p artifacts
          cat > artifacts/release-manifest.json <<JSON
          {
            "commit": "${GITHUB_SHA}",
            "repository": "${GITHUB_REPOSITORY}",
            "workflow": "${GITHUB_WORKFLOW}",
            "runId": "${GITHUB_RUN_ID}",
            "artifactFormat": "oci"
          }
          JSON

      - uses: actions/upload-artifact@v4
        with:
          name: projectpulse-release-manifest
          path: artifacts/release-manifest.json
